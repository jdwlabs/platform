apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openclaw.fullname" . }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "openclaw.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openclaw.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
      {{- if .Values.config }}
      - name: init-config
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
        command:
          - /bin/sh
          - -c
          - |
            mkdir -p /home/openclaw/.openclaw
            if [ -f /home/openclaw/.openclaw/openclaw.json ]; then
              # Merge: existing config as base, helm config overwrites
              node -e "
                const fs = require('fs');
                const existing = JSON.parse(fs.readFileSync('/home/openclaw/.openclaw/openclaw.json', 'utf8'));
                const helm = JSON.parse(fs.readFileSync('/config/openclaw.json', 'utf8'));
                const deepMerge = (target, source) => {
                  for (const key of Object.keys(source)) {
                    if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
                      target[key] = target[key] || {};
                      deepMerge(target[key], source[key]);
                    } else {
                      target[key] = source[key];
                    }
                  }
                  return target;
                };
                const merged = deepMerge(existing, helm);
                fs.writeFileSync('/home/openclaw/.openclaw/openclaw.json', JSON.stringify(merged, null, 2));
              "
            else
              cp /config/openclaw.json /home/openclaw/.openclaw/openclaw.json
            fi
            chown -R 1000:1000 /home/openclaw/.openclaw
        volumeMounts:
          - name: data
            mountPath: /home/openclaw/.openclaw
          - name: config
            mountPath: /config
            readOnly: true
      {{- end }}
      containers:
      - name: openclaw
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["node", "dist/index.js", "gateway", "--bind", "lan", "--port", "18789"]
        env:
        - name: HOME
          value: /home/openclaw
        - name: TZ
          value: UTC
        {{- if .Values.credentials.existingSecret }}
        envFrom:
        - secretRef:
            name: {{ .Values.credentials.existingSecret }}
        {{- end }}
        ports:
        - name: gateway
          containerPort: 18789
        - name: canvas
          containerPort: 18793
        volumeMounts:
        - name: data
          mountPath: /home/openclaw/.openclaw
      - name: chromium
        image: "{{ .Values.chromium.image.repository }}:{{ .Values.chromium.image.tag }}"
        command: ["chromium-browser", "--headless", "--disable-gpu", "--no-sandbox", "--remote-debugging-address=0.0.0.0", "--remote-debugging-port=9222"]
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "openclaw.fullname" . }}
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 1Gi
      {{- if .Values.config }}
      - name: config
        configMap:
          name: {{ include "openclaw.fullname" . }}
      {{- end }}
