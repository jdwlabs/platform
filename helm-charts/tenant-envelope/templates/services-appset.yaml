{{- if .Values.services }}
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: {{ .Values.name }}-services
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  goTemplate: true
  goTemplateOptions:
    - "missingkey=zero"
  generators:
    - list:
        elements: {{ .Values.services | toJson }}
  template:
    metadata:
      name: '{{ .Values.name }}-{{ "{{" }} .name {{ "}}" }}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{ "{{" }} .syncWave | toString {{ "}}" }}'
    spec:
      project: tenant-{{ .Values.name }}
      ignoreDifferences:
        - group: apps
          kind: StatefulSet
          jqPathExpressions:
            - .spec.persistentVolumeClaimRetentionPolicy
            - .spec.podManagementPolicy
            - .spec.updateStrategy
            - .spec.template.metadata.annotations
            - .spec.volumeClaimTemplates[]?.apiVersion
            - .spec.volumeClaimTemplates[]?.kind
            - .spec.volumeClaimTemplates[]?.spec.volumeMode
            - .spec.volumeClaimTemplates[]?.status
        - group: apps
          kind: Deployment
          jqPathExpressions:
            - .spec.template.metadata.annotations."checksum/secret"
            - .spec.selector
        - group: gateway.networking.k8s.io
          kind: Gateway
          jqPathExpressions:
            - .spec.listeners[]?.tls.certificateRefs[]?.group
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
          jqPathExpressions:
            - .spec.parentRefs[]?.group
            - .spec.parentRefs[]?.kind
            - .spec.rules[]?.backendRefs[]?.group
            - .spec.rules[]?.backendRefs[]?.kind
            - .spec.rules[]?.backendRefs[]?.weight
            - .spec.rules[]?.matches
        - group: external-secrets.io
          kind: ExternalSecret
          jqPathExpressions:
            - .spec.data[]?.remoteRef.conversionStrategy
            - .spec.data[]?.remoteRef.decodingStrategy
            - .spec.data[]?.remoteRef.metadataPolicy
            - .spec.target.deletionPolicy
            - .spec.target.template.mergePolicy
        # The prometheus-operator monitoring CRDs (ServiceMonitor, PodMonitor, PrometheusRule)
        # are owned by platform-crds (bootstrap/crds/foundation-crds.yaml) so they exist at
        # wave -1, in time for wave-1/2 services that ship ServiceMonitor manifests in
        # their postInstall directory. The kube-prometheus-stack chart also bundles the
        # same CRDs as helm hooks at older schema versions; without ignoring metadata +
        # spec, the two managers fight via SSA each reconcile.
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          name: servicemonitors.monitoring.coreos.com
          jsonPointers:
            - /metadata/annotations
            - /metadata/labels
            - /spec
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          name: podmonitors.monitoring.coreos.com
          jsonPointers:
            - /metadata/annotations
            - /metadata/labels
            - /spec
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          name: prometheusrules.monitoring.coreos.com
          jsonPointers:
            - /metadata/annotations
            - /metadata/labels
            - /spec
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
          - PruneLast=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
          - SkipDryRunOnMissingResource=true
      destination:
        namespace: '{{ "{{" }} .namespace {{ "}}" }}'
        server: https://kubernetes.default.svc
  templatePatch: |
    spec:
      sources:
        {{ "{{-" }} if .rawManifests {{ "}}" }}
        - repoURL: {{ .Values._platform.repoURL }}
          targetRevision: {{ .Values._platform.revision }}
          path: tenants/{{ .Values.name }}/services/{{ "{{" }} .name {{ "}}" }}/postInstall
        {{ "{{-" }} else {{ "}}" }}
        {{ "{{-" }} if .chartPath {{ "}}" }}
        - repoURL: '{{ "{{" }} .repo {{ "}}" }}'
          path: '{{ "{{" }} .chartPath {{ "}}" }}'
          targetRevision: '{{ "{{" }} .revision {{ "}}" }}'
          helm:
            valueFiles:
              - $values/tenants/{{ .Values.name }}/services/{{ "{{" }} .name {{ "}}" }}/values.yaml
        {{ "{{-" }} else {{ "}}" }}
        - repoURL: '{{ "{{" }} .repo {{ "}}" }}'
          chart: '{{ "{{" }} .chart {{ "}}" }}'
          targetRevision: '{{ "{{" }} .revision {{ "}}" }}'
          helm:
            valueFiles:
              - $values/tenants/{{ .Values.name }}/services/{{ "{{" }} .name {{ "}}" }}/values.yaml
        {{ "{{-" }} end {{ "}}" }}
        - repoURL: {{ .Values._platform.repoURL }}
          targetRevision: {{ .Values._platform.revision }}
          ref: values
        {{ "{{-" }} if .postInstall {{ "}}" }}
        - repoURL: {{ .Values._platform.repoURL }}
          targetRevision: {{ .Values._platform.revision }}
          path: tenants/{{ .Values.name }}/services/{{ "{{" }} .name {{ "}}" }}/postInstall
        {{ "{{-" }} end {{ "}}" }}
        {{ "{{-" }} end {{ "}}" }}
{{- end }}
