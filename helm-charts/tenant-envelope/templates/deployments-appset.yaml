{{- if .Values.deploymentRepo.url }}
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: {{ .Values.name }}-deployments
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - "missingkey=error"
  generators:
    - matrix:
        generators:
          - git:
              repoURL: {{ .Values.deploymentRepo.url | quote }}
              revision: {{ .Values.deploymentRepo.revision | quote }}
              files:
                - path: argocd/config.yaml
          - list:
              elementsYaml: '{{ "{{" }} .apps | toJson {{ "}}" }}'
  template:
    metadata:
      name: '{{ .Values.name }}-{{ "{{" }} .name {{ "}}" }}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{ "{{" }} .syncWave | default "0" | toString {{ "}}" }}'
    spec:
      project: tenant-{{ .Values.name }}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
          - PruneLast=true
          - ServerSideApply=true
      destination:
        namespace: '{{ "{{" }} .namespace {{ "}}" }}'
        server: https://kubernetes.default.svc
  templatePatch: |
    spec:
      sources:
        - repoURL: {{ .Values.deploymentRepo.url | quote }}
          path: '{{ "{{" }} .chartPath {{ "}}" }}'
          targetRevision: {{ .Values.deploymentRepo.revision | quote }}
          helm:
            valueFiles:
              {{ "{{-" }} range .valueFiles {{ "}}" }}
              - {{ "{{" }} . {{ "}}" }}
              {{ "{{-" }} end {{ "}}" }}
{{- end }}
