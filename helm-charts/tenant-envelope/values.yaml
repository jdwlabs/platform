name: ""
displayName: ""
githubOrg: ""
contacts: []

deploymentRepo:
  url: ""
  revision: main

namespaces: []

project:
  elevated: false
  clusterResourceWhitelist: []
  extraSourceRepos: []

services: []

_platform:
  repoURL: https://github.com/jdwlabs/platform.git
  revision: main

_quotaTiers:
  small:
    requests.cpu: "1"
    requests.memory: 2Gi
    limits.cpu: "4"
    limits.memory: 8Gi
    persistentvolumeclaims: "5"
    services.loadbalancers: "1"
  standard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    persistentvolumeclaims: "10"
    services.loadbalancers: "2"
  large:
    requests.cpu: "16"
    requests.memory: 32Gi
    limits.cpu: "64"
    limits.memory: 128Gi
    persistentvolumeclaims: "20"
    services.loadbalancers: "5"
  ci:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    persistentvolumeclaims: "5"
    services.loadbalancers: "0"

_limitRangeTiers:
  small:
    defaultCpu: "200m"
    defaultMemory: "256Mi"
    defaultRequestCpu: "50m"
    defaultRequestMemory: "64Mi"
    maxCpu: "2"
    maxMemory: "4Gi"
    maxStorage: "20Gi"
  standard:
    defaultCpu: "500m"
    defaultMemory: "512Mi"
    defaultRequestCpu: "50m"
    defaultRequestMemory: "64Mi"
    maxCpu: "4"
    maxMemory: "8Gi"
    maxStorage: "50Gi"
  large:
    defaultCpu: "1"
    defaultMemory: "1Gi"
    defaultRequestCpu: "100m"
    defaultRequestMemory: "128Mi"
    maxCpu: "16"
    maxMemory: "32Gi"
    maxStorage: "100Gi"
  ci:
    defaultCpu: "500m"
    defaultMemory: "512Mi"
    defaultRequestCpu: "100m"
    defaultRequestMemory: "128Mi"
    maxCpu: "8"
    maxMemory: "16Gi"
    maxStorage: "50Gi"
