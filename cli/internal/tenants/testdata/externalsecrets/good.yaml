apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: good-secret
  namespace: demo
spec:
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: good-secret
  data:
    - secretKey: token
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: demo
        property: token
