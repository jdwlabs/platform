apiVersion: db.atlasgo.io/v1alpha1
kind: AtlasSchema
metadata:
  name: jdwlabs-atlas-schema-non
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  credentials:
    scheme: postgres
    host: platform-postgresql-cluster-non-rw.database.svc
    user: app
    passwordFrom:
      secretKeyRef:
        key: password
        name: platform-postgresql-cluster-non-app
    database: jdwlabs_non
    port: 5432
    parameters:
      sslmode: disable
  schema:
    configMapKeyRef:
      key: schema.sql
      name: jdwlabs-postgresql-non-schema
  devURL: postgres://postgres:pass@localhost:5432/postgres?sslmode=disable
  devDB:
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_DB
              value: postgres
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: pass
