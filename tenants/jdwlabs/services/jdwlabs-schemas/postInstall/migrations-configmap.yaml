kind: ConfigMap
apiVersion: v1
metadata:
  name: jdwlabs-migrations
data:
  V1__init.sql: |
    CREATE SCHEMA IF NOT EXISTS auth;

    CREATE TABLE IF NOT EXISTS auth.roles
    (
        role_id             BIGINT      NOT NULL GENERATED ALWAYS AS IDENTITY,
        role_name           TEXT        NOT NULL,
        role_description    TEXT        NOT NULL,
        status              TEXT        NOT NULL DEFAULT 'ACTIVE',
        created_by_user_id  BIGINT      NOT NULL,
        created_time        TIMESTAMPTZ NOT NULL,
        modified_by_user_id BIGINT      NOT NULL,
        modified_time       TIMESTAMPTZ NOT NULL,
        PRIMARY KEY (role_id)
    );

    CREATE TABLE IF NOT EXISTS auth.users
    (
        user_id             BIGINT      NOT NULL GENERATED ALWAYS AS IDENTITY,
        email_address       TEXT        NOT NULL UNIQUE,
        password            TEXT        NOT NULL,
        status              TEXT        NOT NULL DEFAULT 'ACTIVE',
        created_by_user_id  BIGINT      NOT NULL,
        created_time        TIMESTAMPTZ NOT NULL,
        modified_by_user_id BIGINT      NOT NULL,
        modified_time       TIMESTAMPTZ NOT NULL,
        PRIMARY KEY (user_id)
    );

    CREATE TABLE IF NOT EXISTS auth.users_roles
    (
        user_id            BIGINT      NOT NULL,
        role_id            BIGINT      NOT NULL,
        created_by_user_id BIGINT      NOT NULL,
        created_time       TIMESTAMPTZ NOT NULL,
        PRIMARY KEY (user_id, role_id),
        CONSTRAINT fk_user FOREIGN KEY (user_id) REFERENCES auth.users (user_id),
        CONSTRAINT fk_role FOREIGN KEY (role_id) REFERENCES auth.roles (role_id)
    );

    CREATE TABLE IF NOT EXISTS auth.profiles
    (
        profile_id          BIGINT      NOT NULL GENERATED ALWAYS AS IDENTITY,
        user_id             BIGINT      NOT NULL,
        first_name          TEXT        NOT NULL,
        middle_name         TEXT,
        last_name           TEXT        NOT NULL,
        birthdate           DATE        NOT NULL,
        created_by_user_id  BIGINT      NOT NULL,
        created_time        TIMESTAMPTZ NOT NULL,
        modified_by_user_id BIGINT      NOT NULL,
        modified_time       TIMESTAMPTZ NOT NULL,
        PRIMARY KEY (profile_id),
        CONSTRAINT fk_user FOREIGN KEY (user_id) REFERENCES auth.users (user_id)
    );

    CREATE TABLE IF NOT EXISTS auth.addresses
    (
        address_id          BIGINT      NOT NULL GENERATED ALWAYS AS IDENTITY,
        profile_id          BIGINT      NOT NULL,
        address_line_1      TEXT        NOT NULL,
        address_line_2      TEXT,
        city                TEXT        NOT NULL,
        state_province      TEXT        NOT NULL,
        postal_code         TEXT        NOT NULL,
        country             TEXT        NOT NULL,
        created_by_user_id  BIGINT      NOT NULL,
        created_time        TIMESTAMPTZ NOT NULL,
        modified_by_user_id BIGINT      NOT NULL,
        modified_time       TIMESTAMPTZ NOT NULL,
        PRIMARY KEY (address_id),
        CONSTRAINT fk_profile FOREIGN KEY (profile_id) REFERENCES auth.profiles (profile_id)
    );

    CREATE TABLE IF NOT EXISTS auth.profile_icons
    (
        icon_id             BIGINT      NOT NULL GENERATED ALWAYS AS IDENTITY,
        profile_id          BIGINT      NOT NULL,
        icon                BYTEA       NOT NULL,
        created_by_user_id  BIGINT      NOT NULL,
        created_time        TIMESTAMPTZ NOT NULL,
        modified_by_user_id BIGINT      NOT NULL,
        modified_time       TIMESTAMPTZ NOT NULL,
        PRIMARY KEY (icon_id),
        CONSTRAINT fk_profile FOREIGN KEY (profile_id) REFERENCES auth.profiles (profile_id)
    );

  V2__fix_permissions.sql: |
    -- Normalize ownership + grant app role to all existing and future objects
    -- in every user schema. Flyway runs as postgres (superuser); app is the runtime role.
    -- Iterates all non-system schemas so this works for any FLYWAY_SCHEMAS configuration.
    DO
    $$
        DECLARE
            s text;
            r record;
        BEGIN
            FOR s IN
                SELECT nspname
                FROM pg_namespace
                WHERE nspname NOT IN ('pg_catalog', 'information_schema', 'pg_toast')
                  AND nspname NOT LIKE 'pg_temp_%'
                  AND nspname NOT LIKE 'pg_toast_temp_%'
                LOOP
                    EXECUTE format('ALTER SCHEMA %I OWNER TO postgres', s);
                    EXECUTE format('GRANT USAGE ON SCHEMA %I TO app', s);
                    
                    FOR r IN
                        SELECT tablename
                        FROM pg_tables
                        WHERE schemaname = s
                          AND tablename <> 'flyway_schema_history'
                        LOOP
                            EXECUTE format('ALTER TABLE %I.%I OWNER TO postgres', s, r.tablename);
                        END LOOP;
                    
                    FOR r IN SELECT sequence_name FROM information_schema.sequences WHERE sequence_schema = s
                        LOOP
                            EXECUTE format('ALTER SEQUENCE %I.%I OWNER TO postgres', s, r.sequence_name);
                        END LOOP;
                    
                    EXECUTE format('GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA %I TO app', s);
                    EXECUTE format('GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA %I TO app', s);
                    
                    EXECUTE format(
                            'ALTER DEFAULT PRIVILEGES FOR ROLE postgres IN SCHEMA %I GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO app',
                            s);
                    EXECUTE format(
                            'ALTER DEFAULT PRIVILEGES FOR ROLE postgres IN SCHEMA %I GRANT USAGE, SELECT ON SEQUENCES TO app',
                            s);
                END LOOP;
        END
    $$;
