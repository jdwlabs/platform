apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-jdwlabs-table-ownership
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: postgres:17
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-postgresql-cluster-non-superuser
                  key: password
            - name: PGPASSWORD_PRD
              valueFrom:
                secretKeyRef:
                  name: platform-postgresql-cluster-prd-superuser
                  key: password
          command: ["sh", "-c"]
          args:
            - |
              set -e
              # NON: transfer auth schema objects from postgres to jdwlabs_non_owner
              psql -h platform-postgresql-cluster-non-rw.database -U postgres -d jdwlabs_non <<'SQL'
              DO $$
              DECLARE r RECORD;
              BEGIN
                IF EXISTS (SELECT 1 FROM pg_namespace WHERE nspname = 'auth') THEN
                  EXECUTE 'ALTER SCHEMA auth OWNER TO jdwlabs_non_owner';
                  FOR r IN SELECT tablename FROM pg_tables WHERE schemaname = 'auth' AND tableowner = 'postgres'
                  LOOP
                    EXECUTE format('ALTER TABLE auth.%I OWNER TO jdwlabs_non_owner', r.tablename);
                  END LOOP;
                  FOR r IN SELECT sequencename FROM pg_sequences WHERE schemaname = 'auth' AND sequenceowner = 'postgres'
                  LOOP
                    EXECUTE format('ALTER SEQUENCE auth.%I OWNER TO jdwlabs_non_owner', r.sequencename);
                  END LOOP;
                END IF;
              END $$;
              SQL
              # PRD: transfer auth schema objects from postgres to jdwlabs_prd_owner
              PGPASSWORD="$PGPASSWORD_PRD" psql -h platform-postgresql-cluster-prd-rw.database -U postgres -d jdwlabs_prd <<'SQL'
              DO $$
              DECLARE r RECORD;
              BEGIN
                IF EXISTS (SELECT 1 FROM pg_namespace WHERE nspname = 'auth') THEN
                  EXECUTE 'ALTER SCHEMA auth OWNER TO jdwlabs_prd_owner';
                  FOR r IN SELECT tablename FROM pg_tables WHERE schemaname = 'auth' AND tableowner = 'postgres'
                  LOOP
                    EXECUTE format('ALTER TABLE auth.%I OWNER TO jdwlabs_prd_owner', r.tablename);
                  END LOOP;
                  FOR r IN SELECT sequencename FROM pg_sequences WHERE schemaname = 'auth' AND sequenceowner = 'postgres'
                  LOOP
                    EXECUTE format('ALTER SEQUENCE auth.%I OWNER TO jdwlabs_prd_owner', r.sequencename);
                  END LOOP;
                END IF;
              END $$;
              SQL
              echo "Ownership migration complete"
