replicaCount: 0
revisionHistoryLimit: 0

persistence:
  enabled: true
  storageClass: "longhorn"
  size: 5Gi

credentials:
  existingSecret: "openclaw-credentials"

chromium:
  enabled: true

config:
  agents:
    defaults:
      model:
        # primary: "anthropic/claude-sonnet-4-20250514"
        primary: "openrouter/anthropic/claude-4.6-sonnet"
      thinkingDefault: "low"
      timeoutSeconds: 600

  # Configure Model Providers
  models:
    providers:
      # OpenRouter (OpenAI-compatible)
      openrouter:
        baseUrl: "https://openrouter.ai/api/v1"
        # The OPENROUTER_API_KEY env var is automatically injected from the Secret
        apiKey: "${OPENROUTER_API_KEY}"
        models: []

      # Example: Local Ollama (Uncomment and set up Ollama service first)
      # ollama:
      #   baseUrl: "http://ollama.jdwlabs-ai.svc.cluster.local:11434/v1"
      #   apiKey: "ollama" # Usually ignored but required by schema

  browser:
    cdpUrl: "http://localhost:9222"
  gateway:
    mode: "local"
    controlUi:
      dangerouslyAllowHostHeaderOriginFallback: true

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi
