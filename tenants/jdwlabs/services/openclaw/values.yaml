replicaCount: 1
revisionHistoryLimit: 0

image:
  tag: "2026.4.29"

persistence:
  enabled: true
  storageClass: "longhorn"
  size: 5Gi

credentials:
  existingSecret: "openclaw-credentials"

chromium:
  enabled: true

config:
  agents:
    defaults:
      model:
        # primary: "anthropic/claude-sonnet-4-20250514"
        primary: "openrouter/anthropic/claude-4.6-sonnet"
      thinkingDefault: "low"
      timeoutSeconds: 600

  # Configure Model Providers
  models:
    providers:
      # OpenRouter (OpenAI-compatible)
      openrouter:
        baseUrl: "https://openrouter.ai/api/v1"
        # The OPENROUTER_API_KEY env var is automatically injected from the Secret
        apiKey: "${OPENROUTER_API_KEY}"
        models: []

  browser:
    cdpUrl: "http://localhost:9222"
  gateway:
    mode: "local"
    trustedProxies: 
      - "10.244.0.0/16"
      - "192.168.1.0/24"
    controlUi:
      dangerouslyAllowHostHeaderOriginFallback: true
      allowedOrigins:
        - "https://ai.jdwlabs.com"

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi
