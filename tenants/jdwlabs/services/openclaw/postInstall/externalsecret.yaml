apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-credentials
  namespace: jdwlabs-ai
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: openclaw-credentials
  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: jdwlabs-ai-keys
        property: anthropic_api_key
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: jdwlabs-ai-keys
        property: openai_api_key
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: jdwlabs-ai-keys
        property: openrouter_api_key
