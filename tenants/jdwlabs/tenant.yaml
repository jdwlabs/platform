name: jdwlabs
displayName: "Jdwlabs"
githubOrg: jdwlabs
contacts:
  - jdwillmsen@gmail.com

deploymentRepo:
  url: https://github.com/jdwlabs/deployments.git
  revision: main

namespaces:
  - name: jdwlabs-non
    quotaTier: standard
    networkPolicy: default
  - name: jdwlabs-prd
    quotaTier: standard
    networkPolicy: default
  - name: jdwlabs-runners
    quotaTier: ci
    networkPolicy: ci
    arc: true

project:
  elevated: false
  clusterResourceWhitelist:
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding

services:
  - name: arc-runner-set-jdwlabs
    chart: gha-runner-scale-set
    repo: ghcr.io/actions/actions-runner-controller-charts
    revision: 0.13.1
    namespace: jdwlabs-runners
    postInstall: true
    syncWave: 5

  - name: arc-runner-set-jdwlabs-custom
    chart: gha-runner-scale-set
    repo: ghcr.io/actions/actions-runner-controller-charts
    revision: 0.13.1
    namespace: jdwlabs-runners
    postInstall: false
    syncWave: 5

  - name: jdwlabs-schemas
    chart: cluster
    repo: https://cloudnative-pg.github.io/charts
    revision: 0.4.0
    namespace: database
    postInstall: true
    syncWave: 5
