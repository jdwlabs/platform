name: dotablaze-tech
displayName: "Dotablaze Tech"
githubOrg: dotablaze-tech
contacts:
  - dotablazegaming@gmail.com

deploymentRepo:
  url: https://github.com/dotablaze-tech/deployments.git
  revision: main

namespaces:
  - name: dotablaze-tech-non
    quotaTier: standard
    networkPolicy: default
  - name: dotablaze-tech-prd
    quotaTier: standard
    networkPolicy: default
  - name: dotablaze-tech-runners
    quotaTier: ci
    networkPolicy: ci
    arc: true

project:
  elevated: false
  clusterResourceWhitelist:
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding

services:
  - name: arc-runner-set-dotablaze-tech
    chart: gha-runner-scale-set
    repo: ghcr.io/actions/actions-runner-controller-charts
    revision: 0.13.1
    namespace: dotablaze-tech-runners
    postInstall: true
    syncWave: 5

  - name: dotablaze-tech-schemas
    chart: ""
    repo: ""
    revision: ""
    namespace: database
    postInstall: false
    rawManifests: true
    syncWave: 5
