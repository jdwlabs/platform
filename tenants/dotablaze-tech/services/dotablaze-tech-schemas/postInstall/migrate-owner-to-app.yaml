apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-dotablazetech-owner-to-app
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: postgres:17
          env:
            - name: PGPASSWORD_NON
              valueFrom:
                secretKeyRef:
                  name: platform-postgresql-cluster-non-superuser
                  key: password
            - name: PGPASSWORD_PRD
              valueFrom:
                secretKeyRef:
                  name: platform-postgresql-cluster-prd-superuser
                  key: password
          command:
            - "sh"
            - "-c"
          args:
            - |
              set -e
              run_migration() {
                local host="$1" db="$2" old_role="$3" pw="$4"
                PGPASSWORD="$pw" psql -v ON_ERROR_STOP=1 -h "$host" -U postgres -d "$db" <<SQL
              DO \$\$
              BEGIN
                IF EXISTS (SELECT 1 FROM pg_roles WHERE rolname = '$old_role') THEN
                  EXECUTE 'REASSIGN OWNED BY $old_role TO app';
                  EXECUTE 'DROP OWNED BY $old_role';
                  EXECUTE 'DROP ROLE $old_role';
                END IF;
              END \$\$;
              SQL
              }
              run_migration platform-postgresql-cluster-non-rw.database dotablazetech_non dotablazetech_non_owner "$PGPASSWORD_NON"
              run_migration platform-postgresql-cluster-prd-rw.database dotablazetech_prd dotablazetech_prd_owner "$PGPASSWORD_PRD"
              echo "dotablazetech owner->app migration complete"