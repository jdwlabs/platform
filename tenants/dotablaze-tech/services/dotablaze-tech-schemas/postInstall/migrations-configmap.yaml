apiVersion: v1
kind: ConfigMap
metadata:
  name: dotablaze-tech-migrations
data:
  V1__init.sql: |
    CREATE TABLE IF NOT EXISTS guilds
    (
        id         TEXT PRIMARY KEY,
        created_at TIMESTAMP DEFAULT NOW()
    );
    
    CREATE TABLE IF NOT EXISTS users
    (
        id         TEXT PRIMARY KEY,
        username   TEXT,
        created_at TIMESTAMP DEFAULT NOW()
    );
    
    CREATE TABLE IF NOT EXISTS user_guild_stats
    (
        guild_id            TEXT REFERENCES guilds (id) ON DELETE CASCADE,
        user_id             TEXT REFERENCES users (id) ON DELETE CASCADE,
        successful_meows    INT DEFAULT 0,
        failed_meows        INT DEFAULT 0,
        total_meows         INT DEFAULT 0,
        current_streak      INT DEFAULT 0,
        highest_streak      INT DEFAULT 0,
        last_meow_at        TIMESTAMP,
        last_failed_meow_at TIMESTAMP,
        PRIMARY KEY (guild_id, user_id)
    );
    
    CREATE INDEX IF NOT EXISTS idx_user_guild_stats_user_id ON user_guild_stats (user_id);
    CREATE INDEX IF NOT EXISTS idx_user_guild_stats_guild_id ON user_guild_stats (guild_id);
    
    CREATE TABLE IF NOT EXISTS guild_streaks
    (
        guild_id           TEXT PRIMARY KEY REFERENCES guilds (id) ON DELETE CASCADE,
        meow_count         INT DEFAULT 0,
        last_user_id       TEXT,
        high_score         INT DEFAULT 0,
        high_score_user_id TEXT
    );
    
    CREATE TABLE IF NOT EXISTS guild_channels
    (
        guild_id   TEXT PRIMARY KEY,
        channel_id TEXT NOT NULL
    );

  V2__fix_permissions.sql: |
    -- Normalize ownership + grant app role to all existing and future objects
    -- in every user schema. Flyway runs as postgres (superuser); app is the runtime role.
    -- Iterates all non-system schemas so this works for any FLYWAY_SCHEMAS configuration.
    DO $$
    DECLARE
        s text;
        r record;
    BEGIN
        FOR s IN
            SELECT nspname FROM pg_namespace
            WHERE nspname NOT IN ('pg_catalog', 'information_schema', 'pg_toast')
              AND nspname NOT LIKE 'pg_temp_%'
              AND nspname NOT LIKE 'pg_toast_temp_%'
        LOOP
            EXECUTE format('ALTER SCHEMA %I OWNER TO postgres', s);
            EXECUTE format('GRANT USAGE ON SCHEMA %I TO app', s);

            FOR r IN
                SELECT tablename FROM pg_tables
                WHERE schemaname = s AND tablename <> 'flyway_schema_history'
            LOOP
                EXECUTE format('ALTER TABLE %I.%I OWNER TO postgres', s, r.tablename);
            END LOOP;

            FOR r IN SELECT sequence_name FROM information_schema.sequences WHERE sequence_schema = s LOOP
                EXECUTE format('ALTER SEQUENCE %I.%I OWNER TO postgres', s, r.sequence_name);
            END LOOP;

            EXECUTE format('GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA %I TO app', s);
            EXECUTE format('GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA %I TO app', s);

            EXECUTE format('ALTER DEFAULT PRIVILEGES FOR ROLE postgres IN SCHEMA %I GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO app', s);
            EXECUTE format('ALTER DEFAULT PRIVILEGES FOR ROLE postgres IN SCHEMA %I GRANT USAGE, SELECT ON SEQUENCES TO app', s);
        END LOOP;
    END $$;
