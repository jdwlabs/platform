apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-dotablazetech-table-ownership
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: postgres:17
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-postgresql-cluster-non-superuser
                  key: password
            - name: PGPASSWORD_PRD
              valueFrom:
                secretKeyRef:
                  name: platform-postgresql-cluster-prd-superuser
                  key: password
          command: ["sh", "-c"]
          args:
            - |
              set -e
              # NON: transfer public schema objects from postgres to dotablazetech_non_owner
              psql -h platform-postgresql-cluster-non-rw.database -U postgres -d dotablazetech_non <<'SQL'
              DO $$
              DECLARE r RECORD;
              BEGIN
                FOR r IN SELECT tablename FROM pg_tables WHERE schemaname = 'public' AND tableowner = 'postgres'
                LOOP
                  EXECUTE format('ALTER TABLE public.%I OWNER TO dotablazetech_non_owner', r.tablename);
                END LOOP;
                FOR r IN SELECT sequencename FROM pg_sequences WHERE schemaname = 'public' AND sequenceowner = 'postgres'
                LOOP
                  EXECUTE format('ALTER SEQUENCE public.%I OWNER TO dotablazetech_non_owner', r.sequencename);
                END LOOP;
              END $$;
              SQL
              # PRD: transfer public schema objects from postgres to dotablazetech_prd_owner
              PGPASSWORD="$PGPASSWORD_PRD" psql -h platform-postgresql-cluster-prd-rw.database -U postgres -d dotablazetech_prd <<'SQL'
              DO $$
              DECLARE r RECORD;
              BEGIN
                FOR r IN SELECT tablename FROM pg_tables WHERE schemaname = 'public' AND tableowner = 'postgres'
                LOOP
                  EXECUTE format('ALTER TABLE public.%I OWNER TO dotablazetech_prd_owner', r.tablename);
                END LOOP;
                FOR r IN SELECT sequencename FROM pg_sequences WHERE schemaname = 'public' AND sequenceowner = 'postgres'
                LOOP
                  EXECUTE format('ALTER SEQUENCE public.%I OWNER TO dotablazetech_prd_owner', r.sequencename);
                END LOOP;
              END $$;
              SQL
              echo "Ownership migration complete"
