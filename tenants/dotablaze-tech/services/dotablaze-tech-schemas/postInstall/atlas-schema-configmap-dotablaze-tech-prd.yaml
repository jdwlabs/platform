kind: ConfigMap
apiVersion: v1
metadata:
  name: dotablaze-tech-postgresql-prd-schema
data:
  schema.sql: |
    CREATE TABLE guilds
    (
        id         TEXT PRIMARY KEY,
        created_at TIMESTAMP DEFAULT NOW()
    );

    CREATE TABLE users
    (
        id         TEXT PRIMARY KEY,
        username   TEXT,
        created_at TIMESTAMP DEFAULT NOW()
    );

    CREATE TABLE user_guild_stats
    (
        guild_id            TEXT REFERENCES guilds (id) ON DELETE CASCADE,
        user_id             TEXT REFERENCES users (id) ON DELETE CASCADE,
        successful_meows    INT DEFAULT 0,
        failed_meows        INT DEFAULT 0,
        total_meows         INT DEFAULT 0,
        current_streak      INT DEFAULT 0,
        highest_streak      INT DEFAULT 0,
        last_meow_at        TIMESTAMP,
        last_failed_meow_at TIMESTAMP,
        PRIMARY KEY (guild_id, user_id)
    );

    CREATE INDEX idx_user_guild_stats_user_id ON user_guild_stats (user_id);
    CREATE INDEX idx_user_guild_stats_guild_id ON user_guild_stats (guild_id);

    CREATE TABLE guild_streaks
    (
        guild_id           TEXT PRIMARY KEY REFERENCES guilds (id) ON DELETE CASCADE,
        meow_count         INT DEFAULT 0,
        last_user_id       TEXT,
        high_score         INT DEFAULT 0,
        high_score_user_id TEXT
    );

    CREATE TABLE IF NOT EXISTS guild_channels
    (
        guild_id   TEXT PRIMARY KEY,
        channel_id TEXT NOT NULL
    );

    -- Grant table privileges to the database owner role
    GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO dotablazetech_prd_owner;
    GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO dotablazetech_prd_owner;

    -- Grant table privileges to the CNPG application user
    GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO app;
    GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO app;

    -- Ensure future tables created by postgres are accessible
    ALTER DEFAULT PRIVILEGES FOR ROLE postgres IN SCHEMA public GRANT ALL ON TABLES TO dotablazetech_prd_owner;
    ALTER DEFAULT PRIVILEGES FOR ROLE postgres IN SCHEMA public GRANT ALL ON SEQUENCES TO dotablazetech_prd_owner;
    ALTER DEFAULT PRIVILEGES FOR ROLE postgres IN SCHEMA public GRANT ALL ON TABLES TO app;
    ALTER DEFAULT PRIVILEGES FOR ROLE postgres IN SCHEMA public GRANT ALL ON SEQUENCES TO app;
