apiVersion: v1
kind: ResourceQuota
metadata:
  name: tenant-quota
  namespace: <TENANT_NAMESPACE>
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    pods: "20"
    persistentvolumeclaims: "10"
    services: "10"
    services.loadbalancers: "2"
    secrets: "30"
    configmaps: "20"
