apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-cluster-capacity
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  cluster-capacity.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {"type": "datasource", "uid": "grafana"},
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "Cluster capacity audit: per-node memory/CPU allocation, limit overcommit, namespace usage, and control-plane OOM risk.",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
          "id": 1,
          "panels": [],
          "title": "Cluster Overview",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"fixedColor": "blue", "mode": "fixed"},
              "mappings": [],
              "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]},
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {"h": 3, "w": 4, "x": 0, "y": 1},
          "id": 2,
          "options": {
            "colorMode": "none",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "pluginVersion": "12.2.1",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "editorMode": "code",
              "expr": "sum(kube_node_status_capacity{resource=\"memory\"})",
              "instant": true,
              "legendFormat": "Capacity",
              "refId": "A"
            }
          ],
          "title": "Cluster Memory Capacity",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"fixedColor": "blue", "mode": "fixed"},
              "mappings": [],
              "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]},
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {"h": 3, "w": 4, "x": 4, "y": 1},
          "id": 3,
          "options": {
            "colorMode": "none",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "pluginVersion": "12.2.1",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "editorMode": "code",
              "expr": "sum(kube_node_status_allocatable{resource=\"memory\"})",
              "instant": true,
              "legendFormat": "Allocatable",
              "refId": "A"
            }
          ],
          "title": "Cluster Allocatable Memory",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"fixedColor": "blue", "mode": "fixed"},
              "mappings": [],
              "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]},
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {"h": 3, "w": 4, "x": 8, "y": 1},
          "id": 4,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "pluginVersion": "12.2.1",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "editorMode": "code",
              "expr": "sum(container_memory_working_set_bytes{container!=\"\"})",
              "legendFormat": "Used",
              "refId": "A"
            }
          ],
          "title": "Cluster Memory Used",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "max": 1,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 0.7},
                  {"color": "red", "value": 0.9}
                ]
              },
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": {"h": 3, "w": 4, "x": 12, "y": 1},
          "id": 5,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "pluginVersion": "12.2.1",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "editorMode": "code",
              "expr": "sum(container_memory_working_set_bytes{container!=\"\"}) / sum(kube_node_status_allocatable{resource=\"memory\"})",
              "legendFormat": "Used %",
              "refId": "A"
            }
          ],
          "title": "Memory Used % of Allocatable",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"fixedColor": "text", "mode": "fixed"},
              "mappings": [],
              "thresholds": {"mode": "absolute", "steps": [{"color": "text", "value": null}]},
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 3, "w": 4, "x": 16, "y": 1},
          "id": 6,
          "options": {
            "colorMode": "none",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "pluginVersion": "12.2.1",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "editorMode": "code",
              "expr": "count(kube_node_info)",
              "instant": true,
              "legendFormat": "Nodes",
              "refId": "A"
            }
          ],
          "title": "Node Count",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [
                {
                  "options": {"match": "null+nan", "result": {"color": "green", "index": 0, "text": "0"}},
                  "type": "special"
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 3, "w": 4, "x": 20, "y": 1},
          "id": 7,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "pluginVersion": "12.2.1",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "editorMode": "code",
              "expr": "count(sum by(node) (kube_pod_container_resource_limits{resource=\"memory\", container!=\"\"} * on(namespace,pod) group_left(node) max by(namespace,pod,node) (kube_pod_info)) / on(node) kube_node_status_allocatable{resource=\"memory\"} > 1) or vector(0)",
              "instant": true,
              "legendFormat": "Overcommitted",
              "refId": "A"
            }
          ],
          "title": "Nodes: Mem Limits > Allocatable",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 4},
          "id": 8,
          "panels": [],
          "title": "Per-Node Memory",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "custom": {
                "align": "auto",
                "cellOptions": {"type": "auto"},
                "filterable": true,
                "inspect": false
              },
              "mappings": [],
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
              "unit": "bytes"
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "Overcommit %"},
                "properties": [
                  {"id": "unit", "value": "percentunit"},
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        {"color": "green", "value": null},
                        {"color": "yellow", "value": 0.8},
                        {"color": "red", "value": 1.0}
                      ]
                    }
                  },
                  {"id": "custom.cellOptions", "value": {"type": "color-background"}}
                ]
              },
              {
                "matcher": {"id": "byName", "options": "node"},
                "properties": [
                  {"id": "unit", "value": "string"},
                  {"id": "custom.width", "value": 220}
                ]
              }
            ]
          },
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 5},
          "id": 9,
          "options": {
            "cellHeight": "sm",
            "showHeader": true,
            "sortBy": [{"desc": false, "displayName": "node"}]
          },
          "pluginVersion": "12.2.1",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "editorMode": "code",
              "expr": "kube_node_status_capacity{resource=\"memory\", node=~\"$node\"}",
              "format": "table",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "editorMode": "code",
              "expr": "kube_node_status_allocatable{resource=\"memory\", node=~\"$node\"}",
              "format": "table",
              "instant": true,
              "legendFormat": "",
              "refId": "B"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "editorMode": "code",
              "expr": "sum by(node) (kube_pod_container_resource_requests{resource=\"memory\", container!=\"\"} * on(namespace,pod) group_left(node) max by(namespace,pod,node) (kube_pod_info{node=~\"$node\"}))",
              "format": "table",
              "instant": true,
              "legendFormat": "",
              "refId": "C"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "editorMode": "code",
              "expr": "sum by(node) (kube_pod_container_resource_limits{resource=\"memory\", container!=\"\"} * on(namespace,pod) group_left(node) max by(namespace,pod,node) (kube_pod_info{node=~\"$node\"}))",
              "format": "table",
              "instant": true,
              "legendFormat": "",
              "refId": "D"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "editorMode": "code",
              "expr": "sum by(node) (container_memory_working_set_bytes{container!=\"\", node=~\"$node\"})",
              "format": "table",
              "instant": true,
              "legendFormat": "",
              "refId": "E"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "editorMode": "code",
              "expr": "sum by(node) (kube_pod_container_resource_limits{resource=\"memory\", container!=\"\"} * on(namespace,pod) group_left(node) max by(namespace,pod,node) (kube_pod_info{node=~\"$node\"})) / on(node) kube_node_status_allocatable{resource=\"memory\", node=~\"$node\"}",
              "format": "table",
              "instant": true,
              "legendFormat": "",
              "refId": "F"
            }
          ],
          "title": "Per-Node Memory: Capacity / Allocatable / Requests / Limits / Used / Overcommit %",
          "transformations": [
            {
              "id": "seriesToColumns",
              "options": {"byField": "node"}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "Time 1": true,
                  "Time 2": true,
                  "Time 3": true,
                  "Time 4": true,
                  "Time 5": true,
                  "Time 6": true,
                  "resource": true,
                  "resource 1": true,
                  "unit": true,
                  "unit 1": true
                },
                "renameByName": {
                  "Value #A": "Capacity",
                  "Value #B": "Allocatable",
                  "Value #C": "Mem Requests",
                  "Value #D": "Mem Limits",
                  "Value #E": "Mem Used",
                  "Value #F": "Overcommit %"
                }
              }
            }
          ],
          "type": "table"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "Bytes",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "insertNulls": false,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "off"}
              },
              "mappings": [],
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 15},
          "id": 10,
          "options": {
            "legend": {"calcs": ["mean", "max"], "displayMode": "table", "placement": "right", "showLegend": true},
            "tooltip": {"hideZeros": false, "mode": "multi", "sort": "desc"}
          },
          "pluginVersion": "12.2.1",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "editorMode": "code",
              "expr": "sum by(node) (container_memory_working_set_bytes{container!=\"\", node=~\"$node\"})",
              "legendFormat": "{{node}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Per-Node Memory Usage Over Time",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 23},
          "id": 11,
          "panels": [],
          "title": "Memory Limit Overcommit",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "max": 2,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 0.8},
                  {"color": "red", "value": 1.0}
                ]
              },
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 24},
          "id": 12,
          "options": {
            "displayMode": "lcd",
            "minVizHeight": 10,
            "minVizWidth": 0,
            "namePlacement": "left",
            "orientation": "horizontal",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "showUnfilled": true,
            "sizing": "auto",
            "valueMode": "color"
          },
          "pluginVersion": "12.2.1",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "editorMode": "code",
              "expr": "sum by(node) (kube_pod_container_resource_limits{resource=\"memory\", container!=\"\"} * on(namespace,pod) group_left(node) max by(namespace,pod,node) (kube_pod_info{node=~\"$node\"})) / on(node) kube_node_status_allocatable{resource=\"memory\", node=~\"$node\"}",
              "instant": true,
              "legendFormat": "{{node}}",
              "refId": "A"
            }
          ],
          "title": "Memory Limit Overcommit % per Node  (>100% = overcommitted, red)",
          "type": "bargauge"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 32},
          "id": 13,
          "panels": [],
          "title": "Per-Namespace Memory Usage",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "Bytes",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "insertNulls": false,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "off"}
              },
              "mappings": [],
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 33},
          "id": 14,
          "options": {
            "legend": {"calcs": ["mean", "max"], "displayMode": "table", "placement": "right", "showLegend": true},
            "tooltip": {"hideZeros": false, "mode": "multi", "sort": "desc"}
          },
          "pluginVersion": "12.2.1",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "editorMode": "code",
              "expr": "topk(10, sum by(namespace) (container_memory_working_set_bytes{container!=\"\", namespace=~\"$namespace\"}))",
              "legendFormat": "{{namespace}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Memory Usage by Namespace (Top 10)",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 41},
          "id": 15,
          "panels": [],
          "title": "Control-Plane OOM Watch",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "Bytes",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "insertNulls": false,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "off"}
              },
              "mappings": [],
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
              "unit": "bytes"
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "Allocatable"},
                "properties": [
                  {"id": "color", "value": {"fixedColor": "red", "mode": "fixed"}},
                  {"id": "custom.lineStyle", "value": {"fill": "dash"}},
                  {"id": "custom.fillOpacity", "value": 0}
                ]
              }
            ]
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 42},
          "id": 16,
          "options": {
            "legend": {"calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true},
            "tooltip": {"hideZeros": false, "mode": "multi", "sort": "desc"}
          },
          "pluginVersion": "12.2.1",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "editorMode": "code",
              "expr": "sum by(node) (container_memory_working_set_bytes{container!=\"\"}) and on(node) (kube_node_labels{label_node_role_kubernetes_io_control_plane=\"\"} or kube_node_labels{label_node_role_kubernetes_io_master=\"\"})",
              "legendFormat": "{{node}} used",
              "range": true,
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
              "editorMode": "code",
              "expr": "kube_node_status_allocatable{resource=\"memory\"} and on(node) (kube_node_labels{label_node_role_kubernetes_io_control_plane=\"\"} or kube_node_labels{label_node_role_kubernetes_io_master=\"\"})",
              "legendFormat": "Allocatable",
              "range": true,
              "refId": "B"
            }
          ],
          "title": "Control-Plane Node Memory Usage vs Allocatable",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "Restarts / interval",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "bars",
                "fillOpacity": 60,
                "gradientMode": "none",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "off"}
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 42},
          "id": 17,
          "options": {
            "legend": {"calcs": [], "displayMode": "table", "placement": "bottom", "showLegend": true},
            "tooltip": {"hideZeros": true, "mode": "multi", "sort": "desc"}
          },
          "pluginVersion": "12.2.1",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${datasource}"},
