apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: longhorn-rules
  namespace: monitoring
spec:
  groups:
    - name: longhorn
      rules:
        - alert: LonghornVolumeUsageHigh
          expr: (longhorn_volume_usage_bytes / longhorn_volume_capacity_bytes) > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn volume {{ $labels.volume }} usage above 85%"
            description: "Volume {{ $labels.volume }} is {{ $value | humanizePercentage }} full."
        - alert: LonghornVolumeFaulted
          expr: longhorn_volume_robustness == 3
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Longhorn volume {{ $labels.volume }} is Faulted"
            description: "Volume {{ $labels.volume }} has lost all replicas and is in a faulted state."
        - alert: LonghornNodeStorageLow
          expr: (longhorn_node_storage_usage_bytes / longhorn_node_storage_capacity_bytes) > 0.80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn node {{ $labels.node }} storage above 80%"
            description: "Node {{ $labels.node }} storage is at {{ $value | humanizePercentage }}."
