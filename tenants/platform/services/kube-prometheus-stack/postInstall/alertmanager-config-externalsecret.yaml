apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-config
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: alertmanager-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        alertmanager.yaml: |
          global:
            resolve_timeout: 5m
          templates:
            - /etc/alertmanager/configmaps/alertmanager-templates/*.tmpl
          route:
            group_by: ['alertname', 'namespace']
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
            receiver: 'discord'
            routes:
              # Mirror critical/warning alerts to the AI-SRE agent for RCA, then
              # continue so the default 'discord' receiver still notifies humans.
              - matchers:
                  - severity =~ "critical|warning"
                receiver: 'holmes'
                continue: true
              - matchers:
                  - alertname = "Watchdog"
                receiver: 'null'
              - matchers:
                  - alertname = "InfoInhibitor"
                receiver: 'null'
          inhibit_rules:
            - source_matchers:
                - severity = "critical"
              target_matchers:
                - severity = "warning"
              equal: ['alertname', 'namespace']
          receivers:
            - name: 'null'
            - name: 'holmes'
              webhook_configs:
                # Chart fullname is '<release>-holmes' => service 'holmes-holmes'.
                - url: 'http://holmes-holmes.ai-sre.svc.cluster.local/api/alertmanager'
                  send_resolved: false
            - name: 'discord'
              discord_configs:
                - webhook_url: "{{ .discord_webhook_url }}"
                  send_resolved: true
                  title: '{{ `{{ template "discord.title" . }}` }}'
                  message: '{{ `{{ template "discord.message" . }}` }}'
  data:
    - secretKey: discord_webhook_url
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: alertmanager
        property: discord_webhook_url
