crds:
  enabled: true

prometheusOperator:
  enabled: true
  admissionWebhooks:
    certManager:
      enabled: true

prometheus:
  prometheusSpec:
    enableRemoteWriteReceiver: true
    retention: 15d
    retentionSize: "20GB"
    # Without requests Prometheus is BestEffort and the kubelet reaps it under
    # node memory pressure mid-WAL-replay on the smaller workers. A 3Gi request
    # makes it Burstable and large enough that the scheduler only fits it on a
    # node with real headroom. No memory limit: replay transiently exceeds
    # steady-state RSS and a hard limit would cgroup-OOM it; retention and
    # retentionSize bound long-run growth instead.
    resources:
      requests:
        cpu: 500m
        memory: 3Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 25Gi
    # Discover ServiceMonitors, PodMonitors, and PrometheusRules from all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false

alertmanager:
  enabled: true
  # Config managed via ExternalSecret (alertmanager-config) - see postInstall/alertmanager-config-externalsecret.yaml.
  # Chart's inline config is ignored when useExistingSecret=true; add new receivers/routes in that ExternalSecret template.
  alertmanagerSpec:
    useExistingSecret: true
    configSecret: alertmanager-config
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
    configMaps:
      - alertmanager-templates

# kube-prometheus-stack owns these going forward
kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true
  prometheus:
    monitor:
      enabled: true

# Grafana managed separately
grafana:
  enabled: false

# Built-in alert rules
defaultRules:
  create: true
  rules:
    alertmanager: true
    configReloaders: true
    general: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubelet: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
    # Disabled - not accessible in this cluster
    etcd: false
    kubeControllerManager: false
    kubeProxy: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false

# Disabled - control plane components not scrape-accessible
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
