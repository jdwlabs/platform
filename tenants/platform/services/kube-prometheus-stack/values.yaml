crds:
  enabled: true

prometheusOperator:
  enabled: true
  admissionWebhooks:
    certManager:
      enabled: true

prometheus:
  prometheusSpec:
    # Prefer the large pve5 worker (labeled workload.jdwlabs.io/monitoring) so
    # the memory-heavy monitoring stack stays off the small general workers.
    # Soft preference: everything still schedules anywhere if that node is down.
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: workload.jdwlabs.io/monitoring
                  operator: In
                  values: ["true"]
    enableRemoteWriteReceiver: true
    retention: 15d
    # Kept below the 25Gi PVC (~26.8GB) so the size-based GC trips before the
    # volume fills; retention (time) and retentionSize (bytes) together bound
    # long-run TSDB growth and the RSS that tracks it.
    retentionSize: "20GB"
    # 60s: halve ingested samples vs 30s default; head block and WAL scale with scrape rate
    scrapeInterval: "60s"
    evaluationInterval: "60s"
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 25Gi
    # Discover ServiceMonitors, PodMonitors, and PrometheusRules from all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    # Peaked at ~2.9Gi with no limits; explicit bounds stop the request from
    # crowding smaller workers. Replaces the earlier 3Gi-request/no-limit shape:
    # WAL-replay spikes shrink with the 60s scrape + cardinality drops above,
    # so a 2Gi ceiling now clears replay. Revisit if replay OOMs recur.
    resources:
      requests:
        memory: 1Gi
        cpu: 250m
      limits:
        memory: 2Gi
        cpu: "1"

kubelet:
  serviceMonitor:
    # Overrides chart defaults (must include all originals); appends TCP/UDP drops not in defaults
    # (high cardinality: state x container x interface, not referenced in any dashboard)
    cAdvisorMetricRelabelings:
      - sourceLabels: [__name__]
        action: drop
        regex: 'container_cpu_(cfs_throttled_seconds_total|load_average_10s|system_seconds_total|user_seconds_total)'
      - sourceLabels: [__name__]
        action: drop
        regex: 'container_fs_(io_current|io_time_seconds_total|io_time_weighted_seconds_total|reads_merged_total|sector_reads_total|sector_writes_total|writes_merged_total)'
      - sourceLabels: [__name__]
        action: drop
        regex: 'container_memory_(mapped_file|swap)'
      - sourceLabels: [__name__]
        action: drop
        regex: 'container_(file_descriptors|tasks_state|threads_max)'
      - sourceLabels: [__name__, scope]
        action: drop
        regex: 'container_memory_failures_total;hierarchy'
      - sourceLabels: [__name__, interface]
        action: drop
        regex: 'container_network_.*;(cali|cilium|cni|lxc|nodelocaldns|tunl).*'
      - sourceLabels: [__name__]
        action: drop
        regex: 'container_spec.*'
      - sourceLabels: [id, pod]
        action: drop
        regex: '.+;'
      - sourceLabels: [__name__]
        action: drop
        regex: 'container_network_(tcp|udp)_usage_total'

alertmanager:
  enabled: true
  # Config managed via ExternalSecret (alertmanager-config) - see postInstall/alertmanager-config-externalsecret.yaml.
  # Chart's inline config is ignored when useExistingSecret=true; add new receivers/routes in that ExternalSecret template.
  alertmanagerSpec:
    useExistingSecret: true
    configSecret: alertmanager-config
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
    configMaps:
      - alertmanager-templates

# kube-prometheus-stack owns these going forward
kubeStateMetrics:
  enabled: true

# Configuration for the kube-state-metrics subchart.
# Cardinality control: kube-state-metrics is a top series-count contributor and
# this Prometheus also receives remote-write from the Grafana Alloy
# k8s-monitoring stack, so series count drives the RSS pressure seen on the
# control plane. kube_*_annotations emits one series per object annotation key
# (annotations routinely carry kubectl last-applied-config, Helm release
# metadata, etc.) — high fan-out and consumed by no rule or dashboard in this
# repo. This is the only kube-state series dropped; label/state metrics are
# kept. Upstream default for this key is [], so this adds rather than masks.
kube-state-metrics:
  prometheus:
    monitor:
      metricRelabelings:
        - sourceLabels: [__name__]
          regex: "kube_.*_annotations"
          action: drop

nodeExporter:
  enabled: true
  prometheus:
    monitor:
      enabled: true

# Grafana managed separately
grafana:
  enabled: false

# Built-in alert rules
defaultRules:
  create: true
  rules:
    alertmanager: true
    configReloaders: true
    general: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubelet: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
    # Disabled - not accessible in this cluster
    etcd: false
    kubeControllerManager: false
    kubeProxy: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false

# Disabled - control plane components not scrape-accessible
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
