nginxGateway:
  kind: deployment
  replicas: 2
  # Control-plane pods ran BestEffort at ~51Mi observed per replica. Request
  # ~2x observed for scheduler visibility; limit leaves headroom for config
  # reload bursts across many routes.
  resources:
    requests:
      memory: 96Mi
    limits:
      memory: 192Mi
  snippets:
    enable: true
  config:
    logging:
      level: info
  metrics:
    enable: true
    port: 9113

nginx:
  kind: daemonSet
  # Data-plane DaemonSet ran BestEffort at ~64Mi observed per pod (321Mi
  # across 5). Request ~2x observed; limit generous because nginx buffer
  # memory scales with concurrent connections and a data-plane OOM drops
  # live traffic.
  container:
    resources:
      requests:
        memory: 128Mi
      limits:
        memory: 256Mi
  config:
    ipFamily: ipv4
  # The gateway DaemonSet has no business running on control-plane nodes.
  # Explicit label-based anti-affinity (not just relying on the CP NoSchedule
  # taint being present at schedule time) so a stray pod can't survive a
  # taint-timing race during a CP node rejoin/reboot (a recurring failure
  # mode).
  pod:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: DoesNotExist
  service:
    type: NodePort
    nodePorts:
      - port: 30180
        listenerPort: 80
      - port: 30543
        listenerPort: 443

certGenerator:
  # ArgoCD polls ~30s; default TTL=30 causes race. 300s gives ArgoCD time to observe Succeeded.
  ttlSecondsAfterFinished: 300

gateways:
  - name: platform-gateway
    namespace: nginx-gateway
    spec:
      gatewayClassName: nginx
      listeners:
        - name: http
          port: 80
          protocol: HTTP
          allowedRoutes:
            namespaces:
              from: All
        - name: https
          port: 443
          protocol: HTTPS
          tls:
            mode: Terminate
            certificateRefs:
              - kind: Secret
                name: wildcard-jdwlabs-tls
          allowedRoutes:
            namespaces:
              from: All
