nginxGateway:
  kind: deployment
  replicas: 2
  snippets:
    enable: true
  config:
    logging:
      level: info
  metrics:
    enable: true
    port: 9113

nginx:
  kind: daemonSet
  config:
    ipFamily: ipv4
  # The gateway DaemonSet has no business running on control-plane nodes.
  # Explicit label-based anti-affinity (not just relying on the CP NoSchedule
  # taint being present at schedule time) so a stray pod can't survive a
  # taint-timing race during a CP node rejoin/reboot (recurring failure mode,
  # see JDWLABS-115).
  pod:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: DoesNotExist
  service:
    type: NodePort
    nodePorts:
      - port: 30180
        listenerPort: 80
      - port: 30543
        listenerPort: 443

certGenerator:
  # ArgoCD polls ~30s; default TTL=30 causes race. 300s gives ArgoCD time to observe Succeeded.
  ttlSecondsAfterFinished: 300

gateways:
  - name: platform-gateway
    namespace: nginx-gateway
    spec:
      gatewayClassName: nginx
      listeners:
        - name: http
          port: 80
          protocol: HTTP
          allowedRoutes:
            namespaces:
              from: All
        - name: https
          port: 443
          protocol: HTTPS
          tls:
            mode: Terminate
            certificateRefs:
              - kind: Secret
                name: wildcard-jdwlabs-tls
          allowedRoutes:
            namespaces:
              from: All
