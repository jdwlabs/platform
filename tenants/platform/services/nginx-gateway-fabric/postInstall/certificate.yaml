apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-jdwlabs
  namespace: nginx-gateway
spec:
  secretName: wildcard-jdwlabs-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "*.jdwlabs.com"
  dnsNames:
    - "jdwlabs.com"
    - "*.jdwlabs.com"
    - "*.prd.jdwlabs.com"
    - "*.non.jdwlabs.com"
