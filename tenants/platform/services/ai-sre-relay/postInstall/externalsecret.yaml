apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ai-sre-relay
  namespace: ai-sre
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: ai-sre-relay
    creationPolicy: Owner
  data:
    - secretKey: LITELLM_KEY
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: holmes
        property: litellm_key
    - secretKey: DISCORD_WEBHOOK_URL
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: holmes
        property: discord_webhook_url
    - secretKey: JIRA_URL
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: holmes
        property: jira_url
    - secretKey: JIRA_USERNAME
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: holmes
        property: jira_email
    - secretKey: JIRA_API_TOKEN
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: holmes
        property: jira_api_token
    - secretKey: GITHUB_TOKEN
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: holmes
        property: github_token
