cluster:
  name: jdwlabs
  namespace: monitoring

# Single collection owner: kube-prometheus-stack scrapes all metrics via
# Prometheus Operator ServiceMonitors/PodMonitors. Alloy previously re-scraped
# kubelet, cAdvisor and the kubelet /metrics/resource endpoint (plus a
# windows-exporter DaemonSet that never schedules on this Linux-only cluster)
# and remote-wrote them into the same Prometheus, duplicating those series.
# This release now ships pod logs and cluster events to Loki only.
# See docs/observability/COLLECTION-OWNERSHIP.md.
clusterMetrics:
  enabled: false

clusterEvents:
  enabled: true

podLogs:
  enabled: true

nodeLogs:
  enabled: false

# Emits usage-report metrics and therefore requires a metrics destination;
# metrics shipping is disabled here, so this must be off for the chart to
# render.
selfReporting:
  enabled: false

alloy-logs:
  enabled: true
  # alloy-logs ran ~175Mi/node unbounded. Cap it: request covers steady state,
  # limit gives headroom for log bursts while protecting node memory.
  alloy:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    # The chart only wires a readinessProbe (hardcoded, 1s timeout) with no
    # livenessProbe, so a wedged Alloy process just sits NotReady forever
    # instead of being restarted — one replica ran wedged for 9 days,
    # re-reading its hostPath log mounts the whole time and saturating that
    # node's disk IO queue. Reuse the same /-/ready endpoint for liveness so
    # kubelet kills and reschedules a stuck replica.
    livenessProbe:
      httpGet:
        path: /-/ready
        port: 12345
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6

# Metrics collection is owned by kube-prometheus-stack; with clusterMetrics
# disabled there is nothing for this instance to collect.
alloy-metrics:
  enabled: false

alloy-singleton:
  enabled: true
  # Cluster-events collector ran ~170Mi live against the chart's 50Mi default
  # request — 120Mi invisible to the scheduler. 192Mi covers observed steady
  # state with modest headroom.
  alloy:
    resources:
      requests:
        memory: 192Mi

destinations:
  - name: Loki
    type: loki
    url: "http://platform-loki:3100/loki/api/v1/push"
