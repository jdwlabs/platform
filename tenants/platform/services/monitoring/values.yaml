cluster:
  name: jdwlabs
  namespace: monitoring

clusterMetrics:
  enabled: true
  # Do not deploy - kube-prometheus-stack owns these
  node-exporter:
    deploy: false
    enabled: false
  kube-state-metrics:
    deploy: false
    enabled: false

clusterEvents:
  enabled: true

podLogs:
  enabled: true

nodeLogs:
  enabled: false

alloy-logs:
  enabled: true
  # alloy-logs ran ~175Mi/node unbounded. Cap it: request covers steady state,
  # limit gives headroom for log bursts while protecting node memory.
  alloy:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi

alloy-metrics:
  enabled: true
  controller:
    # Prefer the large pve5 worker (labeled workload.jdwlabs.io/monitoring) so
    # the memory-heavy monitoring stack stays off the small general workers.
    # Soft preference: everything still schedules anywhere if that node is down.
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: workload.jdwlabs.io/monitoring
                  operator: In
                  values: ["true"]

alloy-singleton:
  enabled: true

destinations:
  - name: Loki
    type: loki
    url: "http://platform-loki:3100/loki/api/v1/push"
  - name: Prometheus
    type: prometheus
    url: "http://platform-kube-prometheus-stack-prometheus:9090/api/v1/write"
