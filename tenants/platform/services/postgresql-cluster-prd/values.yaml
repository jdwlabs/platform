# cluster:
#  storage:
#    size: 6Gi
#    storageClass: "openebs-single-replica"

externalClusters: []

cluster:
  monitoring:
    enabled: true
    podMonitor:
      enabled: true

  affinity:
    # required ensures replicas land on distinct nodes; 4 worker nodes > 3 replicas so
    # there is always a free node for replacement scheduling when one node fails.
    # topologyKey: kubernetes.io/hostname is required because this homelab has no zone labels
    # (topology.kubernetes.io/zone is unset on all nodes, making zone anti-affinity a no-op).
    podAntiAffinityType: required
    topologyKey: kubernetes.io/hostname

  # Without explicit limits the instance pods run BestEffort, so Talos's
  # cgroup OOM-killer reaps them first whenever a 6Gi worker is squeezed
  # (e.g. WAL replay during a node roll). Requests/limits promote them to
  # Burstable — deprioritised for OOM — and let the scheduler reserve their
  # footprint instead of overpacking a node. 768Mi fits ~3 instances per
  # worker alongside Longhorn + system overhead. 192Mi request is the floor:
  # instances idle ~75Mi but WAL replay after a node roll needs the margin —
  # do not trim further.
  resources:
    requests:
      memory: 192Mi
    limits:
      memory: 768Mi

  initdb:
    postInitSQL:
      - ALTER DEFAULT PRIVILEGES FOR ROLE postgres GRANT ALL ON TABLES TO app;
      - ALTER DEFAULT PRIVILEGES FOR ROLE postgres GRANT ALL ON SEQUENCES TO app;
      - ALTER DEFAULT PRIVILEGES FOR ROLE postgres IN SCHEMA public GRANT ALL ON TABLES TO app;
      - ALTER DEFAULT PRIVILEGES FOR ROLE postgres IN SCHEMA public GRANT ALL ON SEQUENCES TO app;

# Tenant isolation is enforced at the database boundary, not at the role level. The `app`
# role owns ever tenant database and is used by Atlas migrations and application pods alike.
databases:
  - name: jdwlabs_prd
    ensure: present
    owner: app
    schemas:
      - name: auth
        owner: app
        ensure: present
  - name: dotablazetech_prd
    ensure: present
    owner: app
