# Tempo datasource for Grafana, with trace-to-logs / trace-to-metrics
# correlation and the service graph wired to the existing Loki and Prometheus
# datasource UIDs (see services/grafana/values.yaml).
#
# COORDINATION REQUIRED: Grafana (services/grafana/values.yaml) is owned by
# another workstream and currently only runs the *dashboards* sidecar
# (sidecar.dashboards), not the datasources sidecar. For this ConfigMap to be
# loaded, that values file must enable:
#
#   sidecar:
#     datasources:
#       enabled: true
#       label: grafana_datasource
#       labelValue: "1"
#       searchNamespace: ALL
#
# Alternatively, paste the `datasources[]` entry below directly into
# services/grafana/values.yaml under datasources.datasources.yaml.datasources.
# Until one of those lands, this ConfigMap is inert (no conflict, additive).
apiVersion: v1
kind: ConfigMap
metadata:
  name: datasource-tempo
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  tempo-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://platform-tempo:3200
        jsonData:
          tracesToLogsV2:
            datasourceUid: P8E90F9AEF21F6940
            spanStartTimeShift: '-1h'
            spanEndTimeShift: '1h'
            tags:
              - key: 'service.name'
                value: 'service_name'
              - key: 'k8s.namespace.name'
                value: 'namespace'
              - key: 'k8s.pod.name'
                value: 'pod'
            filterByTraceID: true
            filterBySpanID: false
          tracesToMetrics:
            datasourceUid: PBFA97CFB590B2093
            spanStartTimeShift: '-1h'
            spanEndTimeShift: '1h'
            tags:
              - key: 'service.name'
                value: 'service'
            queries:
              - name: 'Request rate'
                query: 'sum(rate(traces_spanmetrics_calls_total{$$__tags}[5m]))'
              - name: 'Request error rate'
                query: 'sum(rate(traces_spanmetrics_calls_total{$$__tags,status_code="STATUS_CODE_ERROR"}[5m]))'
              - name: 'Request duration p99'
                query: 'histogram_quantile(0.99, sum(rate(traces_spanmetrics_latency_bucket{$$__tags}[5m])) by (le))'
          serviceMap:
            datasourceUid: PBFA97CFB590B2093
          nodeGraph:
            enabled: true
          tracesToProfiles:
            datasourceUid: ''
