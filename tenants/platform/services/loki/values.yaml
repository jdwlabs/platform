deploymentMode: SingleBinary

read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

singleBinary:
  replicas: 1
  # Prefer the large pve5 worker (labeled workload.jdwlabs.io/monitoring) so
  # the memory-heavy monitoring stack stays off the small general workers.
  # Soft preference: everything still schedules anywhere if that node is down.
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: workload.jdwlabs.io/monitoring
                operator: In
                values: ["true"]
  priorityClassName: platform-critical
  resources:
    requests:
      cpu: 500m
      memory: 768Mi
    limits:
      memory: 1.5Gi
  persistence:
    enabled: true
    # NFS-backed NAS volume; chunk data lives here now that MinIO is gone.
    # Sized to cover WAL + index + chunks previously split across two 20Gi PVCs.
    storageClass: "truenas-nfs"
    size: 30Gi

chunksCache:
  enabled: true
  # Prefer the large pve5 worker (labeled workload.jdwlabs.io/monitoring) so
  # the memory-heavy monitoring stack stays off the small general workers.
  # Soft preference: everything still schedules anywhere if that node is down.
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: workload.jdwlabs.io/monitoring
                operator: In
                values: ["true"]
  allocatedMemory: 512   # MB
  maxItemMemory: 5
  replicas: 1

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem

  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  pattern_ingester:
    enabled: true
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
    retention_period: 14d
    ingestion_rate_mb: 20
    ingestion_burst_size_mb: 40
    retention_stream:
      - selector: '{job="integrations/kubernetes/eventhandler"}'
        priority: 1
        period: 48h
  ruler:
    enable_api: true

monitoring:
  serviceMonitor:
    enabled: true
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: true

minio:
  enabled: false
