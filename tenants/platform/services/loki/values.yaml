deploymentMode: SingleBinary

read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

singleBinary:
  replicas: 1
  priorityClassName: platform-critical
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      memory: 4Gi
  persistence:
    enabled: true
    storageClassName: "longhorn"
    size: 20Gi

chunksCache:
  enabled: true
  allocatedMemory: 512   # MB
  maxItemMemory: 5
  replicas: 1

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: s3
    s3:
      s3ForcePathStyle: true
      insecure: true
    bucketNames:
      chunks: loki-chunks
      ruler: loki-ruler
      admin: loki-admin

  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  pattern_ingester:
    enabled: true
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
    retention_period: 14d
    ingestion_rate_mb: 20
    ingestion_burst_size_mb: 40
    retention_stream:
      - selector: '{job="integrations/kubernetes/eventhandler"}'
        priority: 1
        period: 48h
  ruler:
    enable_api: true

monitoring:
  serviceMonitor:
    enabled: true
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: true

minio:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi
  persistence:
    enabled: true
    storageClassName: "longhorn"
    size: 20Gi
