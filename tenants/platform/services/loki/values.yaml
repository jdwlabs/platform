deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  resources:
    requests:
      memory: 1Gi
    limits:
      memory: 2Gi
  persistence:
    enabled: true
    storageClassName: ""
    storageClass: ""
    size: 20Gi

chunksCache:
  enabled: true
  allocatedMemory: 512   # MB
  maxItemMemory: 5
  replicas: 1

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  pattern_ingester:
    enabled: true
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
    retention_period: 14d
    ingestion_rate_mb: 10
    ingestion_burst_size_mb: 20
    retention_stream:
      - selector: '{job="integrations/kubernetes/eventhandler"}'
        priority: 1
        period: 48h
  ruler:
    enable_api: true

monitoring:
  serviceMonitor:
    enabled: true
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: true

minio:
  resources:
    requests:
      memory: 256Mi
    limits:
      memory: 512Mi
  persistence:
    enabled: true
    storageClassName: ""
    storageClass: ""
    size: 20Gi
  enabled: true

# Zero out other deployment modes
backend:
  persistence:
    enabled: true
    storageClassName: ""
    storageClass: ""
    size: 20Gi
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0
