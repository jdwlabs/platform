revisionHistoryLimit: 0
# Prefer the large pve5 worker (labeled workload.jdwlabs.io/monitoring) so
# the memory-heavy monitoring stack stays off the small general workers.
# Soft preference: everything still schedules anywhere if that node is down.
affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: workload.jdwlabs.io/monitoring
              operator: In
              values: ["true"]

# Single replica on a ReadWriteOnce PVC: RollingUpdate deadlocks because the
# new pod can't attach the volume until the old one is deleted. Recreate stops
# the old pod first.
deploymentStrategy:
  type: Recreate

# Without requests Grafana is BestEffort and was evicted under node memory
# pressure alongside Prometheus. Footprint is bounded, so a limit is safe here
# (unlike Prometheus).
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

admin:
  existingSecret: grafana-admin-credentials
  userKey: admin-user
  passwordKey: admin-password

sidecar:
  # The dashboard sidecar was the one container in this pod with no bounds
  # (the grafana container above is already bounded). It watches ConfigMaps
  # and buffers dashboard JSON in memory, so give it room for large-dashboard
  # reload bursts.
  resources:
    requests:
      memory: 64Mi
    limits:
      memory: 192Mi
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
    searchNamespace: ALL
    provider:
      foldersFromFilesStructure: true

datasources:
  datasources.yaml:
    apiVersion: 1
    deleteDatasources:
      - name: Prometheus
        orgId: 1
      - name: Loki
        orgId: 1
      - name: Alertmanager
        orgId: 1
      - name: Tempo
        orgId: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: PBFA97CFB590B2093
        access: proxy
        url: http://platform-kube-prometheus-s-prometheus:9090
        isDefault: true
      - name: Loki
        type: loki
        uid: P8E90F9AEF21F6940
        access: proxy
        url: http://platform-loki:3100
      - name: Alertmanager
        type: alertmanager
        uid: alertmanager
        access: proxy
        url: http://platform-kube-prometheus-s-alertmanager:9093
        jsonData:
          implementation: prometheus
      # Tracing backend (added with the tempo service). Trace-to-logs and
      # trace-to-metrics correlation reference the Loki and Prometheus UIDs
      # above. The Tempo service is provisioned separately; this datasource is
      # inert until it is reachable.
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://platform-tempo:3200
        jsonData:
          tracesToLogsV2:
            datasourceUid: P8E90F9AEF21F6940
            spanStartTimeShift: '-1h'
            spanEndTimeShift: '1h'
            tags:
              - key: 'service.name'
                value: 'service_name'
              - key: 'k8s.namespace.name'
                value: 'namespace'
              - key: 'k8s.pod.name'
                value: 'pod'
            filterByTraceID: true
            filterBySpanID: false
          tracesToMetrics:
            datasourceUid: PBFA97CFB590B2093
            spanStartTimeShift: '-1h'
            spanEndTimeShift: '1h'
            tags:
              - key: 'service.name'
                value: 'service'
            queries:
              - name: 'Request rate'
                query: 'sum(rate(traces_spanmetrics_calls_total{$__tags}[5m]))'
              - name: 'Request error rate'
                query: 'sum(rate(traces_spanmetrics_calls_total{$__tags,status_code="STATUS_CODE_ERROR"}[5m]))'
              - name: 'Request duration p99'
                query: 'histogram_quantile(0.99, sum(rate(traces_spanmetrics_latency_bucket{$__tags}[5m])) by (le))'
          serviceMap:
            datasourceUid: PBFA97CFB590B2093
          nodeGraph:
            enabled: true

persistence:
  enabled: true
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
  size: 2Gi

# Git Sync (dashboards-as-code). The `provisioning` feature toggle is on by
# default in Grafana v13 OSS; repository_types must be set explicitly so the
# GitHub repository type is selectable. The repository connection (GitHub App
# appID/installationID/privateKey) is created at runtime via Administration >
# General > Provisioning and persisted as a Grafana resource — the GitHub App
# private key is staged in Vault (kv/grafana-gitsync, seeded via
# `platformctl bootstrap seed grafana-gitsync`) and surfaced by the
# grafana-gitsync-github-app ExternalSecret. See README.md for the
# edit -> commit -> PR -> sync workflow and ConfigMap/sidecar coexistence.
grafana.ini:
  provisioning:
    repository_types: "git|github|bitbucket|gitlab|local"
  # Required so Git Sync can build PR/commit deep links back to the instance.
  server:
    root_url: https://grafana.jdwlabs.com

# Mounts the GitHub App private key (synced from Vault by the ExternalSecret)
# so the runtime Git Sync connection can reference it. The connection itself is
# created in-app; this only stages the credential.
extraSecretMounts:
  - name: grafana-gitsync-github-app
    secretName: grafana-gitsync-github-app
    mountPath: /etc/secrets/gitsync
    readOnly: true
