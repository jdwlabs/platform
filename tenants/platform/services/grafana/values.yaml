revisionHistoryLimit: 0

# Single replica on a ReadWriteOnce PVC: RollingUpdate deadlocks because the
# new pod can't attach the volume until the old one is deleted. Recreate stops
# the old pod first.
deploymentStrategy:
  type: Recreate

# Without requests Grafana is BestEffort and was evicted under node memory
# pressure alongside Prometheus. Footprint is bounded, so a limit is safe here
# (unlike Prometheus).
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

admin:
  existingSecret: grafana-admin-credentials
  userKey: admin-user
  passwordKey: admin-password

sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
    searchNamespace: ALL
    provider:
      foldersFromFilesStructure: true

datasources:
  datasources.yaml:
    apiVersion: 1
    deleteDatasources:
      - name: Prometheus
        orgId: 1
      - name: Loki
        orgId: 1
      - name: Alertmanager
        orgId: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: PBFA97CFB590B2093
        access: proxy
        url: http://platform-kube-prometheus-s-prometheus:9090
        isDefault: true
      - name: Loki
        type: loki
        uid: P8E90F9AEF21F6940
        access: proxy
        url: http://platform-loki:3100
      - name: Alertmanager
        type: alertmanager
        uid: alertmanager
        access: proxy
        url: http://platform-kube-prometheus-s-alertmanager:9093
        jsonData:
          implementation: prometheus

persistence:
  enabled: true
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
  size: 2Gi

# Git Sync (dashboards-as-code). The `provisioning` feature toggle is on by
# default in Grafana v13 OSS; repository_types must be set explicitly so the
# GitHub repository type is selectable. The repository connection (GitHub App
# appID/installationID/privateKey) is created at runtime via Administration >
# General > Provisioning and persisted as a Grafana resource — the GitHub App
# private key is staged in Vault and surfaced by the grafana-gitsync-github-app
# ExternalSecret. See README.md for the edit -> commit -> PR -> sync workflow
# and how it coexists with the existing ConfigMap/sidecar dashboards.
grafana.ini:
  provisioning:
    repository_types: "git|github|bitbucket|gitlab|local"
  # Required so Git Sync can build PR/commit deep links back to the instance.
  server:
    root_url: https://grafana.jdwlabs.com

# Mounts the GitHub App private key (synced from Vault by the ExternalSecret
# below) so the runtime Git Sync connection can reference it. The connection
# itself is created in-app; this only stages the credential.
extraSecretMounts:
  - name: grafana-gitsync-github-app
    secretName: grafana-gitsync-github-app
    mountPath: /etc/secrets/gitsync
    readOnly: true
