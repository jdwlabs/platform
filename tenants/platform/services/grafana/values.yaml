revisionHistoryLimit: 0

# Without requests Grafana is BestEffort and was evicted under node memory
# pressure alongside Prometheus (JDWLABS-26). Footprint is bounded, so a limit
# is safe here (unlike Prometheus).
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

admin:
  existingSecret: grafana-admin-credentials
  userKey: admin-user
  passwordKey: admin-password

sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
    searchNamespace: ALL
    provider:
      foldersFromFilesStructure: true

datasources:
  datasources.yaml:
    apiVersion: 1
    deleteDatasources:
      - name: Prometheus
        orgId: 1
      - name: Loki
        orgId: 1
      - name: Alertmanager
        orgId: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: PBFA97CFB590B2093
        access: proxy
        url: http://platform-kube-prometheus-s-prometheus:9090
        isDefault: true
      - name: Loki
        type: loki
        uid: P8E90F9AEF21F6940
        access: proxy
        url: http://platform-loki:3100
      - name: Alertmanager
        type: alertmanager
        uid: alertmanager
        access: proxy
        url: http://platform-kube-prometheus-s-alertmanager:9093
        jsonData:
          implementation: prometheus

persistence:
  enabled: true
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
  size: 2Gi
