ui:
  enabled: true

server:
  dataStorage:
    storageClass: ""
  auditStorage:
    storageClass: ""
  standalone:
    config: |
      listener "tcp" {
        address = "[::]:8200"
        cluster_address = "[::]:8201"
        tls_disable = "true"
      }
      storage "file" {
        path = "/vault/data"
      }
      telemetry {
        unauthenticated_metrics_access = true
        prometheus_retention_time = "30s"
        disable_hostname = true
      }
  ha:
    enabled: false
    raft:
      enabled: false
      setNodeId: true
      config: |
        cluster_name = "vault-integrated-storage"
        storage "raft" {
           path    = "/vault/data/"
        }

        listener "tcp" {
           address = "[::]:8200"
           cluster_address = "[::]:8201"
           tls_disable = "true"
        }
        service_registration "kubernetes" {}
