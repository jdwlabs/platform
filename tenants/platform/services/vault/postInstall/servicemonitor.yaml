apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vault-metrics
  namespace: vault
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: vault
      app.kubernetes.io/instance: platform-vault
    # The headless platform-vault-internal service carries the same labels,
    # which double-scraped the single vault pod; keep only the public service.
    matchExpressions:
      - key: vault-internal
        operator: DoesNotExist
  namespaceSelector:
    matchNames:
      - vault
  endpoints:
    - port: http
      interval: 30s
      path: /v1/sys/metrics
      params:
        format: ["prometheus"]
