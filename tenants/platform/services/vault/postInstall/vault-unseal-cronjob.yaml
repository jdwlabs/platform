apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-auto-unseal
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    platform.jdwlabs.io/note: >-
      Requires vault init with -key-shares=1 -key-threshold=1.
      The vault-unseal-keys secret is created by platformctl bootstrap phase 3.
      Unseals every raft pod by name: the service VIP only reaches one of the
      three, which would leave followers sealed.
spec:
  schedule: "*/2 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: vault-unseal
              image: hashicorp/vault:1.18
              command:
                - /bin/sh
                - -c
                - |
                  set -u
                  for i in 0 1 2; do
                    addr="http://platform-vault-${i}.platform-vault-internal:8200"
                    # operator unseal is a no-op when the node is already
                    # unsealed, so this is safe to run every cycle.
                    VAULT_ADDR="$addr" vault operator unseal "$VAULT_UNSEAL_KEY_1" \
                      || echo "unseal skipped/failed for pod ${i} (may be down)"
                  done
              env:
                - name: VAULT_SKIP_VERIFY
                  value: "1"
                - name: VAULT_UNSEAL_KEY_1
                  valueFrom:
                    secretKeyRef:
                      name: vault-unseal-keys
                      key: unseal_key_1
          restartPolicy: OnFailure
