apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-auto-unseal
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    platform.jdwlabs.io/note: >-
      Requires vault init with -key-shares=1 -key-threshold=1.
      The vault-unseal-keys secret is created by platformctl bootstrap phase 3.
spec:
  schedule: "*/2 * * * *"
  # Forbid + activeDeadline: a job that can never start (bad image, no node
  # capacity) stays Active forever and is invisible to the history limits.
  # Without these, one broken pull accumulated 650+ jobs and exhausted the
  # 110-pod kubelet cap on every worker node.
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 60
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      # Must finish inside one schedule interval (120s).
      activeDeadlineSeconds: 90
      backoffLimit: 2
      # failedJobsHistoryLimit only prunes old Jobs when a *new* failure pushes
      # the count over the limit. Since this runs every 2 minutes and rarely
      # fails twice in a row, one old failed Job can linger indefinitely and
      # keep kube_job_failed pinned at 1. TTL-clean any finished Job after an
      # hour regardless of subsequent successes.
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          # One container per raft member: each pod seals independently, and
          # the ClusterIP service round-robins (publishNotReadyAddresses), so
          # a single service-addressed unseal would hit an arbitrary pod.
          # Per-pod DNS on the headless internal service resolves even while
          # a pod is sealed/unready. All members share the single Shamir key.
          containers:
            - name: vault-unseal-0
              # Upstream publishes no semver tags; pin by digest so the pull is
              # reproducible and immune to a moving :latest re-tag.
              image: blockloop/vault-unseal@sha256:41bcab66bb0759f8b3887b7b2f22a282d5ff3c6e2fc7829eeb2d1c98e3870c62
              env:
                - name: VAULT_ADDR
                  value: "http://platform-vault-0.platform-vault-internal.vault.svc:8200"
                - name: VAULT_SKIP_VERIFY
                  value: "1"
                - name: VAULT_UNSEAL_KEY_1
                  valueFrom:
                    secretKeyRef:
                      name: vault-unseal-keys
                      key: unseal_key_1
            - name: vault-unseal-1
              image: blockloop/vault-unseal@sha256:41bcab66bb0759f8b3887b7b2f22a282d5ff3c6e2fc7829eeb2d1c98e3870c62
              env:
                - name: VAULT_ADDR
                  value: "http://platform-vault-1.platform-vault-internal.vault.svc:8200"
                - name: VAULT_SKIP_VERIFY
                  value: "1"
                - name: VAULT_UNSEAL_KEY_1
                  valueFrom:
                    secretKeyRef:
                      name: vault-unseal-keys
                      key: unseal_key_1
            - name: vault-unseal-2
              image: blockloop/vault-unseal@sha256:41bcab66bb0759f8b3887b7b2f22a282d5ff3c6e2fc7829eeb2d1c98e3870c62
              env:
                - name: VAULT_ADDR
                  value: "http://platform-vault-2.platform-vault-internal.vault.svc:8200"
                - name: VAULT_SKIP_VERIFY
                  value: "1"
                - name: VAULT_UNSEAL_KEY_1
                  valueFrom:
                    secretKeyRef:
                      name: vault-unseal-keys
                      key: unseal_key_1
          restartPolicy: OnFailure
