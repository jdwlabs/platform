csiDriver:
  name: "org.democratic-csi.nfs"

# Driver config is supplied as a rendered secret (api key from Vault via ESO),
# so it is never committed to Git. See postInstall/external-secret.yaml.
driver:
  # Set only so the chart's mount helpers select NFS (not iSCSI) host mounts;
  # the actual driver config comes from existingConfigSecret, not this value.
  config:
    driver: freenas-api-nfs
  existingConfigSecret: democratic-csi-driver-config

storageClasses: []   # StorageClass managed declaratively in postInstall

node:
  # The node DaemonSet has no business running on control-plane nodes.
  # Explicit label-based anti-affinity (not just relying on the CP NoSchedule
  # taint being present at schedule time) so a stray pod can't survive a
  # taint-timing race during a CP node rejoin/reboot (recurring failure mode,
  # see JDWLABS-123).
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist
