csiDriver:
  name: "org.democratic-csi.nfs"

# Driver config is supplied as a rendered secret (api key from Vault via ESO),
# so it is never committed to Git. See postInstall/external-secret.yaml.
driver:
  # Set only so the chart's mount helpers select NFS (not iSCSI) host mounts;
  # the actual driver config comes from existingConfigSecret, not this value.
  config:
    driver: freenas-api-nfs
  existingConfigSecret: democratic-csi-driver-config

storageClasses: []   # StorageClass managed declaratively in postInstall

# Both pods ran BestEffort with real, sustained usage (controller ~143Mi,
# node DS ~86Mi per pod) — first evicted under node memory pressure and
# invisible to the scheduler. Requests are ~1.5x observed per container;
# limits leave burst headroom for mount storms / large volume operations.
controller:
  # democratic-csi driver container carries most of the controller pod's usage.
  driver:
    resources:
      requests:
        memory: 96Mi
      limits:
        memory: 256Mi
  # CSI sidecars idle ~20-30Mi each.
  externalAttacher:
    resources:
      requests:
        memory: 32Mi
      limits:
        memory: 128Mi
  externalProvisioner:
    resources:
      requests:
        memory: 32Mi
      limits:
        memory: 128Mi
  externalResizer:
    resources:
      requests:
        memory: 32Mi
      limits:
        memory: 128Mi
  externalSnapshotter:
    resources:
      requests:
        memory: 32Mi
      limits:
        memory: 128Mi

node:
  # NFS driver container does the actual mount work and carries most of the
  # node pod's ~86Mi observed usage.
  driver:
    resources:
      requests:
        memory: 96Mi
      limits:
        memory: 256Mi
  driverRegistrar:
    resources:
      requests:
        memory: 32Mi
      limits:
        memory: 64Mi
  # Busybox cleanup container; negligible footprint but bounded so the pod has
  # no unbounded container.
  cleanup:
    resources:
      requests:
        memory: 16Mi
      limits:
        memory: 32Mi
  # The node DaemonSet has no business running on control-plane nodes.
  # Explicit label-based anti-affinity (not just relying on the CP NoSchedule
  # taint being present at schedule time) so a stray pod can't survive a
  # taint-timing race during a CP node rejoin/reboot (a recurring failure
  # mode).
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist
