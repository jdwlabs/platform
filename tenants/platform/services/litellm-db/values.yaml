# Single-instance Postgres for the LiteLLM gateway (keys, budgets, spend log).
# Mirrors the existing postgresql-cluster-prd pattern (cnpg 'cluster' chart 0.4.0).
type: postgresql
mode: standalone

cluster:
  instances: 1
  storage:
    size: 5Gi
    storageClass: longhorn
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

# The chart bootstraps its default 'app' database + owner and generates the
# platform-litellm-db-cluster-app secret. A top-level bootstrap: block is a
# dead key here — initdb config would belong under cluster.initdb.
