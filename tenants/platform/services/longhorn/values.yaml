global:
  priorityClassName: platform-critical
  # User-deployed components (longhorn-manager, longhorn-ui, driver-deployer).
  # Control-plane nodes have no toleration for their own NoSchedule taint set
  # at pod-creation time, so a taint-timing race during a CP rejoin/reboot can
  # still leave a stray pod there; nodeSelector prevents it from ever landing.
  nodeSelector:
    workload.jdwlabs.io/worker: "true"

networkPolicies:
  enabled: false

defaultSettings:
  defaultReplicaCount: 3
  replicaSoftAntiAffinity: true
  replicaAutoBalance: "best-effort"
  storageOverProvisioningPercentage: 150
  storageMinimalAvailablePercentage: 20
  upgradeChecker: false
  autoCleanupSystemGeneratedSnapshot: true
  orphanResourceAutoDeletion: "replica-data"
  dataLocality: "best-effort"
  deletingConfirmationFlag: true
  # System-managed components (engine-image, instance-manager, longhorn-csi-plugin).
  systemManagedComponentsNodeSelector: "workload.jdwlabs.io/worker:true"

longhornManager:
  priorityClassName: platform-critical
  resources:
    requests:
      cpu: "100m"
      # Raised from 512Mi: longhorn-manager was OOM-killed (exitCode 137)
      # under volume churn, disrupting instance-managers.
      memory: "1Gi"
    limits:
      cpu: "1000m"
      # Raised from 1Gi to stop OOM-kills under volume churn.
      memory: "2Gi"

longhornDriver:
  priorityClassName: platform-critical
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

longhornUI:
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

ingress:
  enabled: false # Managed via Gateway API in postInstall

persistence:
  defaultClass: true
  defaultClassReplicaCount: 3
  reclaimPolicy: Retain
