global:
  priorityClassName: platform-critical
  # User-deployed components (longhorn-manager, longhorn-ui, driver-deployer).
  # Control-plane nodes have no toleration for their own NoSchedule taint set
  # at pod-creation time, so a taint-timing race during a CP rejoin/reboot can
  # still leave a stray pod there; nodeSelector prevents it from ever landing.
  nodeSelector:
    workload.jdwlabs.io/worker: "true"

networkPolicies:
  enabled: false

defaultSettings:
  defaultReplicaCount: 3
  replicaSoftAntiAffinity: true
  replicaAutoBalance: "best-effort"
  storageOverProvisioningPercentage: 150
  storageMinimalAvailablePercentage: 20
  upgradeChecker: false
  autoCleanupSystemGeneratedSnapshot: true
  orphanResourceAutoDeletion: "replica-data"
  dataLocality: "best-effort"
  deletingConfirmationFlag: true
  # System-managed components (engine-image, instance-manager, longhorn-csi-plugin).
  systemManagedComponentsNodeSelector: "workload.jdwlabs.io/worker:true"
  # The CSI components all ran BestEffort — this Longhorn setting (a JSON
  # string) is the only knob the chart exposes for them. Requests are ~1.5-2x
  # observed per pod (attacher ~26Mi, provisioner ~32Mi, resizer ~27Mi,
  # snapshotter ~34Mi, csi-plugin pod ~52Mi across its three containers);
  # limits leave >=2x headroom so volume churn doesn't OOM the CSI path.
  systemManagedCSIComponentsResourceLimits: >-
    {"csi-attacher":{"requests":{"memory":"48Mi"},"limits":{"memory":"128Mi"}},
    "csi-provisioner":{"requests":{"memory":"64Mi"},"limits":{"memory":"128Mi"}},
    "csi-resizer":{"requests":{"memory":"48Mi"},"limits":{"memory":"128Mi"}},
    "csi-snapshotter":{"requests":{"memory":"64Mi"},"limits":{"memory":"128Mi"}},
    "longhorn-csi-plugin":{"requests":{"memory":"64Mi"},"limits":{"memory":"256Mi"}},
    "node-driver-registrar":{"requests":{"memory":"16Mi"},"limits":{"memory":"64Mi"}},
    "longhorn-liveness-probe":{"requests":{"memory":"16Mi"},"limits":{"memory":"64Mi"}}}

longhornManager:
  priorityClassName: platform-critical
  resources:
    requests:
      cpu: "100m"
      # ~165Mi steady-state per manager; 512Mi leaves churn headroom without
      # reserving 1Gi/node the scheduler can never hand out. OOM protection
      # comes from the limit below, not the request.
      memory: "512Mi"
    limits:
      cpu: "1000m"
      # Raised from 1Gi to stop OOM-kills under volume churn. Do not lower.
      memory: "2Gi"

# The chart exposes no resources values for longhorn-driver-deployer,
# longhorn-ui, the engine-image DaemonSet, or instance-manager memory
# (guaranteedInstanceManagerCPU is CPU-only) — earlier longhornDriver/
# longhornUI resources blocks here were silently ignored by the chart and
# have been removed rather than left looking effective.
longhornDriver:
  priorityClassName: platform-critical

longhornUI:
  replicas: 1

ingress:
  enabled: false # Managed via Gateway API in postInstall

persistence:
  defaultClass: true
  defaultClassReplicaCount: 3
  reclaimPolicy: Retain
