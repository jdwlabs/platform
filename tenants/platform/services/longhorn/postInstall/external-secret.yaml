apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: longhorn-basic-auth
    template:
      type: nginx.org/htpasswd
      data:
        auth: "{{ .auth }}"
  data:
    - secretKey: auth
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: longhorn
        property: htpasswd_string
