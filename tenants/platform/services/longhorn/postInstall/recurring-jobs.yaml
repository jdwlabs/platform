apiVersion: longhorn.io/v1beta1
kind: RecurringJob
metadata:
  name: snapshot-cleanup
  namespace: longhorn-system
spec:
  cron: "0 1 * * *" # Daily at 1 AM
  task: "snapshot-cleanup"
  retain: 0
  concurrency: 2
---
apiVersion: longhorn.io/v1beta1
kind: RecurringJob
metadata:
  name: filesystem-trim
  namespace: longhorn-system
spec:
  cron: "0 3 * * *" # Daily at 3 AM
  task: "filesystem-trim"
  retain: 0
  concurrency: 1
