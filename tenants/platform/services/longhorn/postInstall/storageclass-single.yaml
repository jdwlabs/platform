apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-single
  annotations:
    # Single-replica, persistent storage for workloads that replicate their own
    # data at the application layer (e.g. Vault raft, where the 3 pods each hold
    # a full copy). One Longhorn replica per volume avoids redundant nested
    # replication and confines a Longhorn instance-manager fault to a single
    # application node — the app's own quorum handles durability. Retain so the
    # volume is not auto-deleted on PVC churn.
    #
    # Distinct from longhorn-ephemeral-local (Delete) which is for throwaway CI
    # scratch. Do NOT use for apps without their own replication.
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Retain
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "1"
  dataLocality: "best-effort"
  staleReplicaTimeout: "30"
  fromBackup: ""
  fsType: "ext4"
