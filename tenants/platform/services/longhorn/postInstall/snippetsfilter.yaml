apiVersion: gateway.nginx.org/v1alpha1
kind: SnippetsFilter
metadata:
  name: longhorn-basic-auth
  namespace: longhorn-system
spec:
  snippets:
    - context: http.server.location
      value: |
        auth_basic "Authentication Required - Longhorn";
        auth_basic_user_file /etc/nginx/secrets/longhorn-basic-auth;
