apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dex-secrets
  namespace: argocd
  annotations:
    # Use client-side apply for this resource. Under the app's ServerSideApply
    # + RespectIgnoreDifferences with ignoreDifferences on spec.data[].remoteRef.*,
    # appended data entries (github-client-id/secret) never converged — ArgoCD
    # reported the resource OutOfSync indefinitely (autoheal looped) and the new
    # keys never reached the Secret, leaving the Dex GitHub connector without
    # credentials. CSA 3-way merge replaces the atomic spec.data list cleanly.
    argocd.argoproj.io/sync-options: ServerSideApply=false
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: dex-secrets
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: argocd
  data:
    - secretKey: admin-password-hash
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: argocd-dex
        property: admin-password-hash
    - secretKey: headlamp-client-secret
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: argocd-dex
        property: headlamp-client-secret
    - secretKey: github-client-id
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: argocd-dex
        property: github-client-id
    - secretKey: github-client-secret
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: argocd-dex
        property: github-client-secret
