apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: platform-gateway
      namespace: nginx-gateway
      sectionName: argocd-passthrough
  hostnames:
    - argocd.jdwlabs.com
  rules:
    - backendRefs:
        - name: platform-argo-cd-argocd-server
          port: 443
