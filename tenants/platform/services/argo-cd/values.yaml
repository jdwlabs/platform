fullnameOverride: argocd

# Drives configs.cm `url`, which in turn is the Dex OIDC issuer
# (<url>/api/dex). Left at the chart default (argocd.example.com) the
# issuer claim in Dex tokens never matches what Headlamp validates against.
global:
  domain: argocd.jdwlabs.com

configs:
  params:
    server.insecure: true
  cm:
    accounts.claude-mcp: apiKey
    dex.config: |
      # GitHub connector gives Headlamp/ArgoCD social login (mobile passkey)
      # alongside the staticPasswords fallback below. Login is gated to jdwlabs
      # org members; cluster-admin is then granted per-email by the
      # headlamp-oidc-admin ClusterRoleBinding (org members without a binding
      # authenticate but get no RBAC — fail closed). clientID/secret come from
      # the GitHub OAuth App via Vault (key argocd-dex). The redirectURI must
      # be registered as the OAuth App's Authorization callback URL.
      connectors:
        - type: github
          id: github
          name: GitHub
          config:
            clientID: $dex-secrets:github-client-id
            clientSecret: $dex-secrets:github-client-secret
            redirectURI: https://argocd.jdwlabs.com/api/dex/callback
            orgs:
              - name: jdwlabs
            loadAllGroups: false
            useLoginAsID: false
      enablePasswordDB: true
      oauth2:
        skipApprovalScreen: true
      staticPasswords:
        - email: admin@jdwlabs.com
          hash: $dex-secrets:admin-password-hash
          username: admin
          userID: "08a8684b-db88-4b73-90a9-3cd1661f5466"
      staticClients:
        - id: headlamp
          redirectURIs:
            - https://dashboard.jdwlabs.com/oidc-callback
          name: Headlamp
          secret: $dex-secrets:headlamp-client-secret
  rbac:
    policy.csv: |
      p, role:readonly, applications, get, */*, allow
      p, role:readonly, applications, list, */*, allow
      p, role:readonly, clusters, get, *, allow
      p, role:readonly, projects, get, *, allow
      p, role:readonly, repositories, get, *, allow
      p, role:readonly, logs, get, */*, allow
      p, role:readonly, exec, create, */*, deny
      g, claude-mcp, role:readonly
      # SSO login via the Dex staticPasswords admin (admin@jdwlabs.com);
      # separate identity from the built-in local `admin` account.
      g, admin@jdwlabs.com, role:admin

controller:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  resources:
    requests:
      cpu: 200m
      # Controller sits ~740Mi steady managing 50+ apps; request tracks live
      # use so the scheduler sees it.
      memory: 768Mi
    limits:
      cpu: 1000m
      # 1Gi was OOM-killed during mass-merge sync storms; keep burst headroom
      # ~2x steady state.
      memory: 1536Mi

server:
  service:
    type: ClusterIP
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

repoServer:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  livenessProbe:
    timeoutSeconds: 5
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

applicationSet:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

notifications:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

dex:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 256Mi

redis:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
