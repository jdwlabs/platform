fullnameOverride: argocd

configs:
  params:
    server.insecure: true
  cm:
    accounts.claude-mcp: apiKey
    dex.config: |
      # ArgoCD's dex config generator hard-requires `connectors` to be a
      # list — even empty — or dex-server and argocd-server exit fatal with
      # "malformed Dex configuration found". staticPasswords alone fails.
      connectors: []
      enablePasswordDB: true
      oauth2:
        skipApprovalScreen: true
      staticPasswords:
        - email: admin@jdwlabs.com
          hash: $dex-secrets:admin-password-hash
          username: admin
          userID: "08a8684b-db88-4b73-90a9-3cd1661f5466"
      staticClients:
        - id: headlamp
          redirectURIs:
            - https://dashboard.jdwlabs.com/oidc-callback
          name: Headlamp
          secret: $dex-secrets:headlamp-client-secret
  rbac:
    policy.csv: |
      p, role:readonly, applications, get, */*, allow
      p, role:readonly, applications, list, */*, allow
      p, role:readonly, clusters, get, *, allow
      p, role:readonly, projects, get, *, allow
      p, role:readonly, repositories, get, *, allow
      p, role:readonly, logs, get, */*, allow
      p, role:readonly, exec, create, */*, deny
      g, claude-mcp, role:readonly

controller:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

server:
  service:
    type: ClusterIP
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

repoServer:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  livenessProbe:
    timeoutSeconds: 5
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

applicationSet:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

notifications:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

dex:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 256Mi

redis:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
