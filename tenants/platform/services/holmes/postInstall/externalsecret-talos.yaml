apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: holmes-talos
  namespace: ai-sre
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: holmes-talos
    creationPolicy: Owner
  data:
    # Read-only (os:reader) talosconfig for the talos/readonly toolset.
    # Seeded via `platformctl bootstrap seed` from PLATFORMCTL_HOLMES_TALOSCONFIG;
    # until seeded this ES stays unsynced and the pod's optional secret volume
    # simply renders empty.
    - secretKey: config
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: holmes
        property: talosconfig
