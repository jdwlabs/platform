apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: holmes-llm
  namespace: ai-sre
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: holmes-llm
    creationPolicy: Owner
  data:
    # Holmes authenticates to LiteLLM with OpenAI-format auth; this is the
    # LiteLLM master key (or a scoped virtual key minted in LiteLLM).
    - secretKey: OPENAI_API_KEY
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: holmes
        property: litellm_key
