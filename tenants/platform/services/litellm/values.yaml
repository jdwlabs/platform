# Provider-agnostic LLM gateway. Backend swap = edit model_list, no client change.

# Use the CNPG-managed litellm-db cluster instead of the chart's bundled Postgres.
# CNPG generates secret platform-litellm-db-cluster-app with keys username/password/host/uri.
db:
  deployStandalone: false
  useExisting: true
  endpoint: platform-litellm-db-cluster-rw.ai-sre.svc.cluster.local
  # 'app', not 'litellm': the cnpg cluster chart bootstraps its default
  # database/owner (app/app), matching the prd/non postgres clusters.
  database: app
  secret:
    name: platform-litellm-db-cluster-app
    usernameKey: username
    passwordKey: password
  # Chart default docker.io/bitnami/postgresql:<pinned> no longer resolves --
  # Bitnami purged versioned tags from the bitnami org; the same tag lives on
  # in bitnamilegacy. Only used by the db-ready wait init container.
  dbReadyImage: docker.io/bitnamilegacy/postgresql
  dbReadyTag: "16.1.0-debian-11-r20"

# Built-in Redis disabled; we use our own ephemeral Redis (litellm-redis service).
redis:
  enabled: false

# Injects provider API keys and LITELLM_MASTER_KEY as env vars from Vault-backed ESO secret.
environmentSecrets:
  - litellm-secrets

proxy_config:
  model_list:
    # Zero-cost tier only — no paid API credits on any provider. Alias is
    # role-named so backend swaps (Phase 4 local vLLM) never touch clients.
    # All three backends verified for tool calling, which Holmes requires.
    # OpenRouter :free = 50 req/day at $0 balance (1000/day once $10 lifetime
    # credit purchased); NIM direct is a separate free quota pool.
    # gpt-oss-120b leads on latency: nemotron-3-ultra-550b measured 433-600s+
    # per investigation (blowing the relay's per-alert deadline); the ultra
    # model stays as the deeper-reasoning fallback.
    - model_name: sre-investigator
      litellm_params:
        model: openrouter/openai/gpt-oss-120b:free
        api_key: os.environ/OPENROUTER_API_KEY
        # Holmes asks for 64k output tokens; some providers reserve quota for
        # the full max_tokens per request. 16k is ample for RCA prose.
        max_tokens: 16384
    - model_name: sre-investigator-fb1
      litellm_params:
        model: openrouter/nvidia/nemotron-3-ultra-550b-a55b:free
        api_key: os.environ/OPENROUTER_API_KEY
        max_tokens: 16384
    - model_name: sre-investigator-fb2
      litellm_params:
        model: nvidia_nim/nvidia/nemotron-3-super-120b-a12b
        api_key: os.environ/NVIDIA_NIM_API_KEY
        max_tokens: 16384
  # Phase 4 adds: local vLLM tier -> hosted_vllm/... api_base http://<pve5-ip>:8000
  general_settings:
    # LITELLM_MASTER_KEY is injected from the litellm-secrets ESO secret above.
    master_key: os.environ/LITELLM_MASTER_KEY
    store_model_in_db: true
  router_settings:
    redis_host: litellm-redis.ai-sre.svc.cluster.local
    redis_port: 6379
    # Free endpoints rate-limit and brown-out; degrade across quota pools
    # before failing an investigation.
    fallbacks:
      - sre-investigator: ["sre-investigator-fb1", "sre-investigator-fb2"]
  litellm_settings:
    drop_params: true
    num_retries: 2

# 2Gi: boot spike (Prisma engine + proxy import) OOMKilled the container at
# both 512Mi and 1Gi within ~4s; verified starting clean at 2Gi.
resources:
  requests: {cpu: 100m, memory: 512Mi}
  limits: {memory: 2Gi}
