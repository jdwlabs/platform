apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-secrets
  namespace: ai-sre
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: litellm-secrets
    creationPolicy: Owner
  data:
    # ANTHROPIC_API_KEY dropped with the paid claude-sonnet route: the
    # subscription plan carries no API credits, so the model tier is
    # zero-cost providers only. The vault property stays for a future re-add.
    - secretKey: LITELLM_MASTER_KEY
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: litellm
        property: master_key
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: litellm
        property: openrouter_api_key
    - secretKey: NVIDIA_NIM_API_KEY
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: litellm
        property: nvidia_api_key
