apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: db-ui
  namespace: database
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  parentRefs:
    - name: platform-gateway
      namespace: nginx-gateway
      sectionName: https
  hostnames:
    - dbui.jdwlabs.com
  rules:
    - backendRefs:
        - name: platform-db-ui-adminer
          port: 80
