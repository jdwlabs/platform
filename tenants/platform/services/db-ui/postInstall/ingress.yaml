apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: db-ui-ingress
  namespace: database
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - dbui.jdwlabs.com
      secretName: db-ui-tls
  rules:
    - host: dbui.jdwlabs.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: platform-db-ui-adminer
                port:
                  number: 80
