apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-oidc-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  # Username shape is <oidc-username-prefix><email claim> as configured on
  # the kube-apiserver (oidc-username-prefix=oidc:, oidc-username-claim=email).
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: oidc:admin@jdwlabs.com
