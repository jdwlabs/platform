apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-oidc-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  # Username shape is <oidc-username-prefix><email claim> as configured on
  # the kube-apiserver (oidc-username-prefix=oidc:, oidc-username-claim=email).
  # Static-password login (Dex staticPasswords) resolves to admin@jdwlabs.com.
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: oidc:admin@jdwlabs.com
  # GitHub-connector login resolves to the GitHub account's primary verified
  # email (jdwillmsen@gmail.com). This binding is what grants that identity
  # cluster-admin; a mismatch would fail closed (authenticated, no RBAC).
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: oidc:jdwillmsen@gmail.com
