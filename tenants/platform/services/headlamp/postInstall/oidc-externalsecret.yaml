apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: headlamp-oidc-secret
  namespace: headlamp
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: headlamp-oidc-secret
    # Headlamp's chart externalSecret mode injects this Secret via envFrom,
    # so the keys must be the literal env var names the binary reads.
    template:
      engineVersion: v2
      data:
        OIDC_CLIENT_ID: headlamp
        OIDC_CLIENT_SECRET: "{{ .clientSecret }}"
        OIDC_ISSUER_URL: https://argocd.jdwlabs.com/api/dex
        # offline_access makes Dex issue a refresh token, which Headlamp's
        # backend caches and uses to renew the 24h id_token silently —
        # without it every expiry forces a full Dex re-login (painful on
        # mobile). Dex stores refresh tokens in memory, so a dex-server
        # restart still requires one re-login.
        OIDC_SCOPES: profile email offline_access
  data:
    - secretKey: clientSecret
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: argocd-dex
        property: headlamp-client-secret
