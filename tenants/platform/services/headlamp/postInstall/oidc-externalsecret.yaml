apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: headlamp-oidc-secret
  namespace: headlamp
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: headlamp-oidc-secret
    # Headlamp's chart externalSecret mode injects this Secret via envFrom,
    # so the keys must be the literal env var names the binary reads.
    template:
      engineVersion: v2
      data:
        OIDC_CLIENT_ID: headlamp
        OIDC_CLIENT_SECRET: "{{ .clientSecret }}"
        OIDC_ISSUER_URL: https://argocd.jdwlabs.com/api/dex
        OIDC_SCOPES: profile email
  data:
    - secretKey: clientSecret
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: argocd-dex
        property: headlamp-client-secret
