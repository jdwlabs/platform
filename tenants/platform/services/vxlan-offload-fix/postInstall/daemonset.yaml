apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vxlan-offload-fix
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: vxlan-offload-fix
    app.kubernetes.io/part-of: platform-networking
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: vxlan-offload-fix
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vxlan-offload-fix
    spec:
      hostNetwork: true
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
      terminationGracePeriodSeconds: 5
      containers:
        - name: ethtool
          image: nicolaka/netshoot@sha256:47b907d662d139d1e2f22bfe14f4efca1e3f1feed283572f47c970c780c03b61
          securityContext:
            privileged: true
          # On virtio_net NICs, flannel.1 keeps tx-checksum-ip-generic offload on, which
          # leaves inner TCP checksums wrong after VXLAN encapsulation. The receiving node's
          # conntrack flags those packets invalid and kube-proxy's nftables backend drops
          # them (ct state invalid), silently blackholing cross-node pod TCP while ICMP still
          # passes. virtio_net rx-checksum is fixed-on and can't be disabled, so the only
          # lever is sender-side tx offload, and it must run on every node. Re-applied on a
          # loop because the setting resets each time flannel recreates flannel.1.
          command: ["/bin/sh", "-c"]
          args:
            - |
              while true; do
                for iface in flannel.1 eth0; do
                  ethtool -K "$iface" tx-checksum-ip-generic off 2>/dev/null
                  ethtool -K "$iface" tx off gso off gro off tso off 2>/dev/null
                done
                sleep 30
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
