groupName: jdwlabs.com

certManager:
  namespace: cert-manager
  serviceAccountName: platform-cert-manager

image:
  repository: ghcr.io/mdonoughe/porkbun-webhook
  tag: v0.1.5
  pullPolicy: IfNotPresent

# Ran BestEffort (first evicted under node memory pressure, invisible to the
# scheduler). Observed ~76Mi; request ~1.7x that, limit leaves headroom for
# DNS-01 challenge bursts at renewal time.
resources:
  requests:
    memory: 128Mi
  limits:
    memory: 256Mi
