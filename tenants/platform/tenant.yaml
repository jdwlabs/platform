name: platform
displayName: "Platform Infrastructure"
githubOrg: jdwlabs
contacts:
  - jdwillmsen@gmail.com

deploymentRepo:
  url: ""
  revision: ""

namespaces:
  - name: argocd
    quotaTier: platform
    networkPolicy: platform
  - name: cert-manager
    quotaTier: platform
    networkPolicy: platform
  - name: longhorn-system
    quotaTier: platform
    networkPolicy: platform
  - name: vault
    quotaTier: platform
    networkPolicy: platform
  - name: vault-config-operator
    quotaTier: platform
    networkPolicy: platform
  - name: external-secrets
    quotaTier: platform
    networkPolicy: platform
  - name: monitoring
    quotaTier: platform
    networkPolicy: platform
  - name: headlamp
    quotaTier: platform
    networkPolicy: platform
  - name: atlas
    quotaTier: platform
    networkPolicy: platform
  - name: cnpg-system
    quotaTier: platform
    networkPolicy: platform
  - name: arc-systems
    quotaTier: platform
    networkPolicy: platform
  - name: database
    quotaTier: platform
    networkPolicy: platform
  - name: metrics-server
    quotaTier: platform
    networkPolicy: platform
  - name: kube-system
    quotaTier: platform
    networkPolicy: platform
  - name: nginx-gateway
    quotaTier: platform
    networkPolicy: platform
  - name: porkbun-webhook
    quotaTier: platform
    networkPolicy: platform

project:
  elevated: true
  clusterResourceWhitelist: []
  extraSourceRepos:
    - 'https://argoproj.github.io/argo-helm'
    - 'https://charts.jetstack.io'
    - 'https://charts.longhorn.io'
    - 'https://charts.external-secrets.io'
    - 'https://helm.releases.hashicorp.com'
    - 'https://redhat-cop.github.io/vault-config-operator'
    - 'https://kubernetes-sigs.github.io/metrics-server/'
    - 'https://grafana.github.io/helm-charts'
    - 'https://prometheus-community.github.io/helm-charts'
    - 'https://kubernetes-sigs.github.io/headlamp/'
    - 'ghcr.io/ariga'
    - 'https://cloudnative-pg.github.io/charts'
    - 'ghcr.io/actions/actions-runner-controller-charts'
    - 'https://charts.ectobit.com'
    - 'ghcr.io/nginx/charts'

services:
  # Wave 0: Bare metal networking + ArgoCD self-management
  - name: gateway-api-crds
    chart: ""
    repo: ""
    revision: ""
    namespace: nginx-gateway
    rawManifests: true
    syncWave: 0

  - name: argo-cd
    chart: argo-cd
    repo: https://argoproj.github.io/argo-helm
    revision: 9.4.17
    namespace: argocd
    postInstall: true
    syncWave: 0

  # Wave 1: Core infrastructure
  - name: cert-manager
    chart: cert-manager
    repo: https://charts.jetstack.io
    revision: v1.18.2
    namespace: cert-manager
    postInstall: true
    syncWave: 1

  - name: porkbun-webhook
    chart: ""
    chartPath: helm-charts/porkbun-webhook
    repo: https://github.com/jdwlabs/platform.git
    revision: main
    namespace: porkbun-webhook
    postInstall: false
    syncWave: 1

  - name: nginx-gateway-fabric
    chart: nginx-gateway-fabric
    repo: ghcr.io/nginx/charts
    revision: 2.5.1
    namespace: nginx-gateway
    postInstall: true
    syncWave: 1

  - name: longhorn
    chart: longhorn
    repo: https://charts.longhorn.io
    revision: 1.10.1
    namespace: longhorn-system
    postInstall: true
    syncWave: 1

  # Wave 2: Platform services
  - name: external-secrets
    chart: external-secrets
    repo: https://charts.external-secrets.io
    revision: 0.19.2
    namespace: external-secrets
    postInstall: true
    syncWave: 2

  - name: vault
    chart: vault
    repo: https://helm.releases.hashicorp.com
    revision: 0.30.1
    namespace: vault
    postInstall: true
    syncWave: 2

  - name: vault-config-operator
    chart: vault-config-operator
    repo: https://redhat-cop.github.io/vault-config-operator
    revision: v0.8.33
    namespace: vault-config-operator
    postInstall: false
    syncWave: 2

  - name: metrics-server
    chart: metrics-server
    repo: https://kubernetes-sigs.github.io/metrics-server/
    revision: 3.13.0
    namespace: metrics-server
    postInstall: false
    syncWave: 2

  - name: monitoring
    chart: k8s-monitoring
    repo: https://grafana.github.io/helm-charts
    revision: 3.3.2
    namespace: monitoring
    postInstall: false
    syncWave: 2

  - name: grafana
    chart: grafana
    repo: https://grafana.github.io/helm-charts
    revision: 9.4.3
    namespace: monitoring
    postInstall: true
    syncWave: 2

  - name: loki
    chart: loki
    repo: https://grafana.github.io/helm-charts
    revision: 6.38.0
    namespace: monitoring
    postInstall: true
    syncWave: 2

  - name: kube-prometheus-stack
    chart: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    revision: "69.4.0"
    namespace: monitoring
    postInstall: true
    syncWave: 2

  - name: headlamp
    chart: headlamp
    repo: https://kubernetes-sigs.github.io/headlamp/
    revision: 0.41.0
    namespace: headlamp
    postInstall: true
    syncWave: 2

  - name: atlas-operator
    chart: charts/atlas-operator
    repo: ghcr.io/ariga
    revision: 0.7.14
    namespace: atlas
    postInstall: false
    syncWave: 2

  # Wave 3: Operators
  - name: cnpg-operator
    chart: cloudnative-pg
    repo: https://cloudnative-pg.github.io/charts
    revision: 0.26.1
    namespace: cnpg-system
    postInstall: true
    syncWave: 3

  - name: arc-systems
    chart: gha-runner-scale-set-controller
    repo: ghcr.io/actions/actions-runner-controller-charts
    revision: 0.13.1
    namespace: arc-systems
    postInstall: true
    syncWave: 3

  # Wave 4: Shared database infrastructure
  - name: postgresql-cluster-non
    chart: cluster
    repo: https://cloudnative-pg.github.io/charts
    revision: 0.4.0
    namespace: database
    postInstall: false
    syncWave: 4

  - name: postgresql-cluster-prd
    chart: cluster
    repo: https://cloudnative-pg.github.io/charts
    revision: 0.4.0
    namespace: database
    postInstall: false
    syncWave: 4

  - name: db-ui
    chart: adminer
    repo: https://charts.ectobit.com
    revision: 0.1.8
    namespace: database
    postInstall: true
    syncWave: 4
