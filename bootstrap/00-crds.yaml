apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: bootstrap
  source:
    repoURL: https://github.com/jdwlabs/platform.git
    targetRevision: main
    path: bootstrap/crds
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system # CRDs are cluster-scoped, but app needs a namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
