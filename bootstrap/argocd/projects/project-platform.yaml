apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  description: "Platform-tier infrastructure applications"
  sourceRepos:
    - 'https://github.com/jdwlabs/platform.git'
    - 'https://helm.releases.hashicorp.com'
    - 'https://charts.jetstack.io'
    - 'https://kubernetes.github.io/ingress-nginx'
    - 'https://metallb.github.io/metallb'
    - 'https://charts.longhorn.io'
    - 'https://charts.external-secrets.io'
    - 'https://kubernetes-sigs.github.io/dashboard'
    - 'https://kubernetes.github.io/dashboard'
    - 'https://grafana.github.io/helm-charts'
    - 'https://prometheus-community.github.io/helm-charts'
    - 'https://cloudnative-pg.github.io/charts'
    - 'ghcr.io/ariga'
    - 'ghcr.io/actions/actions-runner-controller-charts'
    - 'https://redhat-cop.github.io/vault-config-operator'
    - 'https://charts.ectobit.com'
  destinations:
    - server: https://kubernetes.default.svc
      namespace: '*'
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
