apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenants
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - "missingkey=error"
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/jdwlabs/platform.git
              revision: main
              files:
                - path: tenants/*/config.yaml
          - list:
              elementsYaml: "{{.apps | toJson}}"
  template:
    metadata:
      name: '{{.tenant}}-{{.name}}'
      annotations:
        argocd.argoproj.io/sync-wave: "{{.syncWave}}"
    spec:
      project: 'tenant-{{.tenant}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
          - ServerSideApply=true
      destination:
        namespace: '{{.namespace}}'
        server: https://kubernetes.default.svc
  templatePatch: |
    spec:
      sources:
        - repoURL: '{{ .repo }}'
          chart: '{{ .chart }}'
          targetRevision: '{{ .revision }}'
          helm:
            valueFiles:
              - $values/tenants/{{ .tenant }}/apps/{{ .name }}/values.yaml
        - repoURL: https://github.com/jdwlabs/platform.git
          targetRevision: main
          ref: values
        {{- if .postInstall }}
        - repoURL: https://github.com/jdwlabs/platform.git
          targetRevision: main
          path: tenants/{{ .tenant }}/apps/{{ .name }}/postInstall
        {{- end }}
