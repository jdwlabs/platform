name: Update Chart Index Page

on:
  workflow_run:
    workflows: ["Release Chart"]
    types: [completed]

permissions:
  contents: write

jobs:
  update-index:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.1.0
        with:
          fetch-depth: 0

      - uses: actions/checkout@v6.1.0
        with:
          ref: gh-pages
          path: gh-pages

      - name: Install dependencies
        run: pip install PyYAML

      - name: Generate index.html
        run: python3 tools/generate-index.py

      - name: Push index.html to gh-pages
        run: |
          cp index.html gh-pages/index.html
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "docs: regenerate chart index page [skip ci]"
          git push
