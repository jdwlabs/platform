name: Validate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lint YAML
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: |
            tenants/
            bootstrap/
          config_data: |
            extends: default
            ignore: |
              tenants/platform/services/gateway-api-crds/postInstall/experimental-install.yaml
              tenants/platform/services/*/postInstall/dashboard-*.yaml
            rules:
              line-length:
                max: 300
              truthy:
                allowed-values: ['true', 'false']
              comments:
                min-spaces-from-content: 1
              document-start: disable

  validate-tenants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate tenant.yaml files
        run: |
          pip install PyYAML
          python3 tools/validate-tenants.py

  kubeconform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install kubeconform
        run: |
          curl -sSLo kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/
      - name: Validate Kubernetes manifests
        run: |
          find tenants -name '*.yaml' \
            ! -name 'values.yaml' \
            ! -name 'tenant.yaml' \
            ! -path '*/helm-charts/*' | \
            xargs kubeconform \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
              -ignore-missing-schemas \
              -summary
