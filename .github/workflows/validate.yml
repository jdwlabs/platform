name: Validate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.1.0
      - name: Lint YAML
        uses: ibiqlik/action-yamllint@v3.1.1
        with:
          file_or_dir: |
            tenants/
            bootstrap/
          config_data: |
            extends: default
            ignore: |
              bootstrap/crds/foundation-crds.yaml
              tenants/platform/services/*/postInstall/dashboard-*.yaml
            rules:
              line-length:
                max: 300
              truthy:
                allowed-values: ['true', 'false']
              comments:
                min-spaces-from-content: 1
              document-start: disable

  platformctl-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v6.1.0
      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: cli/go.mod
          cache: true
      - name: Build platformctl
        run: go build -o /tmp/platformctl ./cmd/platformctl
      - name: Validate tenants
        working-directory: .
        run: /tmp/platformctl tenants validate tenants/

  kubeconform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.1.0
      - name: Install kubeconform
        run: |
          curl -sSLo kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/
      - name: Validate Kubernetes manifests
        run: |
          find tenants -name '*.yaml' \
            ! -name 'values.yaml' \
            ! -name 'tenant.yaml' \
            ! -path '*/helm-charts/*' | \
            xargs kubeconform \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
              -ignore-missing-schemas \
              -summary

  go-build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v6.1.0
      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: cli/go.mod
          cache: true
      - name: Build
        run: go build ./...
      - name: Test
        run: go test -race ./...

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.1.0
      - uses: azure/setup-helm@v5.0.1
        with:
          version: latest
      - name: Lint all charts
        run: |
          for chart in helm-charts/*/; do
            echo "Linting $chart"
            helm lint "$chart"
          done
      - name: Install kubeconform
        run: |
          curl -sSLo kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/
      - name: Render + validate each chart
        run: |
          for chart in helm-charts/*/; do
            echo "Rendering $chart"
            helm template "$(basename "$chart")" "$chart" | kubeconform \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
              -ignore-missing-schemas \
              -summary
          done
